<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية - تصميم احترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #3949ab; --accent: #ff4081; --bg: #eef2f3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: all 0.3s ease; }
        body { display: flex; height: 100vh; background-color: var(--bg); overflow: hidden; }

        /* Sidebar Modern */
        .sidebar { width: 260px; background: linear-gradient(180deg, var(--primary), #0d47a1); color: white; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 30px 20px; font-size: 24px; font-weight: bold; text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-left: 4px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent); transform: translateX(5px); }
        .sidebar-footer { margin-top: auto; padding: 20px; background: rgba(0,0,0,0.2); text-align: center; cursor: pointer; }

        /* Main Content Animation */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { color: var(--primary); margin-bottom: 15px; }

        /* Button Pro */
        .btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; color: white; font-weight: bold; background: var(--secondary); }
        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">👁️ منصة رؤية</div>
        <div class="sidebar-nav">
            <div class="nav-item" onclick="show('home')">🏠 الرئيسية</div>
            <div class="nav-item" onclick="show('classes')">🏫 الشعب الدراسية</div>
            <div class="nav-item" onclick="show('schedule')">📅 الجدول</div>
        </div>
        <div class="sidebar-footer" id="authBtn" onclick="toggleAuth()">🔐 تسجيل الدخول</div>
    </div>

    <div class="main-content">
        <div id="home" class="page">
            <div class="card">
                <h3>مرحباً بك في لوحة التحكم</h3>
                <p>هذا التصميم يعتمد على تجربة مستخدم (UX) انسيابية.</p>
            </div>
        </div>
        <!-- يمكنك إضافة باقي الأقسام هنا -->
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function toggleAuth() {
            const btn = document.getElementById('authBtn');
            btn.style.background = btn.style.background === 'rgb(255, 64, 129)' ? '' : '#ff4081';
            btn.innerText = btn.innerText === '🔐 تسجيل الدخول' ? '🔓 تسجيل الخروج' : '🔐 تسجيل الدخول';
        }
    </script>
</body>
</html>
