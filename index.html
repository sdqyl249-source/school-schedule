<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية التعليمية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #1a237e; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main { margin-right: 250px; padding: 20px; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; color: white; }
        .btn-admin { display: none; background: #d32f2f; } /* يظهر للأعضاء فقط */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>👁️ رؤية</h2>
    <div onclick="showSection('home')">🏠 الرئيسية</div><br>
    <div onclick="showSection('honor')">🏆 لوحة الشرف</div><br>
    <div onclick="showSection('complaint')">📩 الشكاوي</div>
</div>

<div class="main">
    <!-- الرئيسية وآخر الأخبار -->
    <div id="home" class="section">
        <div class="card">
            <h3>📢 آخر الأخبار</h3>
            <ul><li>تنبيه: تحديث جدول الامتحانات النهائي يوم الخميس.</li></ul>
        </div>
    </div>

    <!-- لوحة الشرف -->
    <div id="honor" class="section hidden">
        <div id="cert" class="card" style="border: 2px solid #1a237e; width: 400px; text-align: center;">
            <h2>شهادة تقدير</h2>
            <p>يُشهد بأن الطالب: <input type="text" id="stuName" placeholder="اسم الطالب"></p>
            <button class="btn" style="background:#1a237e" onclick="downloadCert()">تحميل PDF</button>
        </div>
    </div>

    <!-- صندوق الشكاوي -->
    <div id="complaint" class="section hidden">
        <textarea id="compText" placeholder="اكتب شكوتك هنا..."></textarea>
        <button class="btn" style="background:green" onclick="sendComplaint()">إرسال</button>
    </div>
</div>

<script>
    // تبديل الأقسام
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // توليد PDF
    function downloadCert() {
        const element = document.getElementById('cert');
        html2pdf().from(element).save('شهادة.pdf');
    }

    // إرسال الشكوى
    function sendComplaint() {
        alert("تم إرسال الشكوى للإدارة بنجاح!");
    }

    // منطق تسجيل الدخول البسيط (محاكاة)
    const isAdmin = false; // قم بتغييرها لـ true لتجربة صلاحيات الأستاذ
    if(isAdmin) {
        document.querySelectorAll('.btn-admin').forEach(b => b.style.display = 'inline-block');
    }
</script>

</body>
</html>
