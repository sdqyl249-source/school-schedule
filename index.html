<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; }
        .sidebar { height: 100%; width: 280px; position: fixed; top: 0; right: 0; background: #1a252f; color: white; padding-top: 20px; }
        .menu-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid #333; }
        .menu-item:hover { background: #34495e; }
        .page { margin-right: 300px; padding: 20px; display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; border-right: 8px solid #3498db; }
        .editable { border: 1px dashed #ccc; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; font-size:20px; font-weight:bold; padding-bottom:20px;">👁️ منصة رؤية</div>
    <div class="menu-item" onclick="showPage('home')">🏠 الرئيسية</div>
    <div class="menu-item" onclick="showPage('announcements')">📢 لوحة الإعلانات</div>
    <div class="menu-item" onclick="showPage('classes')">🏫 إدارة الصفوف</div>
    <div class="menu-item" onclick="showPage('schedule')">📅 جدول الدروس</div>
    <div class="menu-item" onclick="showPage('library')">📚 المكتبة الرقمية</div>
    <div class="menu-item" id="authBtn">🔐 تسجيل الدخول</div>
</div>

<!-- الرئيسية -->
<div id="home" class="page" style="display:block;">
    <div class="card" style="text-align:center;">
        <h3 id="date-display"></h3>
        <p id="time-display" style="font-size:1.5em; font-weight:bold;"></p>
    </div>
    <div class="card"><h3>رؤية المدرسة</h3><p id="school-vision" class="editable">رؤيتنا تعليم متميز...</p></div>
    <div class="card"><h3>عدد الزوار</h3><h2 id="visitor-count">100</h2></div>
</div>

<!-- الإعلانات -->
<div id="announcements" class="page">
    <div class="card">
        <h3>📢 إضافة إعلان جديد</h3>
        <input type="text" id="ann-title" placeholder="عنوان الإعلان" style="width:100%; margin-bottom:10px;">
        <textarea id="ann-text" placeholder="نص الإعلان" style="width:100%; height:80px;"></textarea>
        <button onclick="addAnnouncement()">نشر الإعلان</button>
    </div>
    <div id="announcements-list"></div>
</div>

<!-- الصفوف -->
<div id="classes" class="page">
    <div class="card">
        <h3>🏫 إدارة الصفوف</h3>
        <input type="text" id="class-name" placeholder="اسم الصف">
        <input type="text" id="section-name" placeholder="الشعبة">
        <button onclick="addClass()">إضافة الصف</button>
    </div>
    <div id="classes-list"></div>
</div>

<!-- الجدول -->
<div id="schedule" class="page">
    <div class="card">
        <h3>📅 إضافة حصة للجدول</h3>
        <select id="select-class"></select>
        <input type="text" id="subject-name" placeholder="اسم المادة">
        <button onclick="addSchedule()">إضافة للجدول</button>
    </div>
    <div id="schedule-list"></div>
</div>

<!-- المكتبة -->
<div id="library" class="page">
    <div class="card">
        <h3>📚 إضافة ملف للمكتبة</h3>
        <input type="text" id="book-name" placeholder="اسم الملف/الكتاب">
        <button onclick="addBook()">رفع الملف</button>
    </div>
    <div id="library-list"></div>
</div>

<script src="scriot.js"></script>
</body>
</html>
