<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية التعليمية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; transition: 0.3s; }

        /* القائمة الجانبية */
        .sidebar { width: 260px; background-color: #1a237e; color: white; display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .sidebar.closed { width: 0; overflow: hidden; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #303f9f; }
        .sidebar-nav { flex: 1; padding: 10px; }
        .nav-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #303f9f; }
        .sidebar-footer { padding: 20px; border-top: 1px solid #303f9f; cursor: pointer; background: #303f9f; text-align: center; }
        
        /* المحتوى */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .section { display: none; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button onclick="toggleSidebar()" style="float:left; cursor:pointer;">X</button>
            <h2>👁️ رؤية</h2>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item" onclick="showSection('home')">🏠 الرئيسية</div>
            <div class="nav-item" onclick="showSection('classes')">🏫 الشعب الدراسية</div>
            <div class="nav-item" onclick="showSection('schedule')">📅 جدول الدروس</div>
            <div class="nav-item" onclick="showSection('honor')">🏆 لوحة الشرف</div>
        </div>
        <div class="sidebar-footer" onclick="toggleAuth()" id="authBtn">🔐 تسجيل الدخول</div>
    </div>

    <div class="main-content">
        <button onclick="toggleSidebar()">☰ القائمة</button>
        
        <div id="home" class="section active">
            <div class="card"><h3>📢 آخر الأخبار</h3><p>• تنبيه: غداً عطلة رسمية.</p></div>
        </div>

        <div id="schedule" class="section">
            <div class="card">
                <h3>📅 جدول الدروس</h3>
                <table width="100%" border="1" cellpadding="10" style="border-collapse: collapse;">
                    <tr><th>اليوم</th><th>المادة</th><th>الوقت</th></tr>
                    <tr><td>الأحد</td><td>اقتصاد قياسي</td><td>9:00 - 11:00</td></tr>
                </table>
            </div>
        </div>

        <!-- الأقسام الأخرى (الشعب، الشرف) تبقى كما هي -->
        <div id="classes" class="section">...</div>
        <div id="honor" class="section">...</div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        let isAdmin = false;
        function toggleAuth() {
            isAdmin = !isAdmin;
            document.getElementById('authBtn').innerText = isAdmin ? "🔓 تسجيل الخروج" : "🔐 تسجيل الدخول";
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
        }
    </script>
</body>
</html>
