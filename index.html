<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤية</title>
    <style>
        /* التنسيق العام */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; }

        /* السايد بار الاحترافي */
        .sidebar {
            height: 100%;
            width: 280px;
            position: fixed;
            top: 0;
            right: -280px;
            background: linear-gradient(180deg, #1a252f 0%, #2c3e50 100%);
            color: white;
            transition: 0.4s ease;
            z-index: 1000;
            padding-top: 20px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { right: 0; }

        .sidebar-header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item {
            padding: 18px 25px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .menu-item:hover { background-color: rgba(255,255,255,0.1); border-right: 4px solid #3498db; }

        .sidebar-footer { margin-top: auto; padding: 20px; background: #162029; text-align: center; cursor: pointer; }

        /* الصفحات والبطاقات */
        .page { padding: 20px; display: none; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        .btn { padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; border-radius: 6px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<!-- زر القائمة -->
<button onclick="toggleSidebar()" style="position:fixed; top:10px; right:10px; z-index:999; background: #34495e; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px;">☰ القائمة</button>

<!-- القائمة الجانبية -->
<div class="sidebar" id="mySidebar">
    <div class="sidebar-header">
        👁️ منصة رؤية <span onclick="toggleSidebar()" style="cursor:pointer; padding:0 10px;">✕</span>
    </div>
    <div class="menu-item" onclick="show('home')">🏠 الرئيسية</div>
    <div class="menu-item" onclick="show('classes')">🏫 الشعب الدراسية</div>
<div class="menu-item" onclick="window.location.href='schedule.html'">📅 جدول الدروس</div>    <div class="menu-item" onclick="toggleSubmenu('library-submenu')">📚 المكتبة الرقمية ▼</div>
    <div id="library-submenu" style="display: none; background: #162029;">
        <div class="menu-item" onclick="show('library')">المكتبة العامة</div>
    </div>
    <div class="menu-item" onclick="show('complaints')">📩 الشكاوي</div>
    <div class="sidebar-footer" id="authBtn" onclick="toggleAuth()">🔐 تسجيل الدخول</div>
</div>

<!-- المحتوى -->
<div id="home" class="page" style="display: block;">
    <div class="card"><h3>📢 لوحة التبليغات</h3><div id="news-display"></div></div>
</div>

<div id="classes" class="page">
    <div class="card"><h3>قائمة الشعب الدراسية</h3><table><tr><th>الصف</th><th>الشعبة</th></tr><tr><td>الأول</td><td>(أ)</td></tr></table></div>
</div>

<div id="schedule" class="page">
    <div class="card"><h3>📅 جدول الدروس</h3><div id="app"></div></div>
</div>

<div id="complaints" class="page">
    <div class="card"><h3>📩 صندوق الشكاوي</h3><textarea id="compText" style="width:100%; padding:10px;"></textarea><button class="btn" onclick="sendComplaint()" style="margin-top:10px;">إرسال</button></div>
</div>

<!-- السكربت -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="scriot.js"></script>
<script>
    function toggleSidebar() { document.getElementById('mySidebar').classList.toggle('active'); }
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        toggleSidebar();
    }
    function toggleSubmenu(id) {
        const s = document.getElementById(id);
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
