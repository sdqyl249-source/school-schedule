<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الوادي - الرئيسية</title>
    <link rel="stylesheet" href="classes_style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f0f2f5; }
        
        /* تنسيق القائمة الجانبية */
        .sidebar { height: 100%; width: 280px; position: fixed; top: 0; right: 0; background: #1a252f; color: white; padding-top: 20px; z-index: 1000; }
        .sidebar-title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #2c3e50; }
        .menu-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid #243342; transition: 0.3s; font-size: 16px; }
        .menu-item:hover { background: #34495e; padding-right: 35px; }
        .logout-btn { width: 80%; margin: 20px auto; display: block; padding: 10px; background: #e74c3c; border: none; color: white; border-radius: 5px; cursor: pointer; }
        /* تنسيق زر الإغلاق */
        .close-btn { color: white; display: block; text-align: left; }
        .close-btn:hover { color: #ff6b6b; }

        .active-nav { background-color: #2c3e50 !important; border-right: 4px solid #2ecc71; }
        /* المحتوى الرئيسي */
        .main-content { margin-right: 280px; padding: 30px; }

        @media screen and (max-width: 768px) {
            .sidebar { width: 0; overflow: hidden; }
            .main-content { margin-right: 0; }
        }
    </style>
</head>
<body>

<!-- القائمة الجانبية -->
<div class="sidebar" id="mySidebar">
   <span class="close-btn" onclick="closeSidebar()" style="cursor:pointer; padding: 10px 20px; font-size: 20px;">×</span>
    <div class="sidebar-title">🏞️ منصة الوادي</div>
    <div class="menu-item" onclick="location.href='index.html'">🏠 الرئيسية</div>
    <div class="menu-item" onclick="location.href='classes.html'">🏫 إدارة الصفوف</div>
    <div class="menu-item" onclick="location.href='schedule.html'">📅 جدول الدروس</div>
    <div class="menu-item" onclick="location.href='library.html'">📚 المكتبة الرقمية</div>
    <div class="menu-item" onclick="location.href='games.html'">🎮 الترفيه والألعاب</div>
    <button onclick="logout()" class="logout-btn">تسجيل الخروج</button>
</div>

<!-- المحتوى الرئيسي -->
<div class="main-content">
    <h1>مرحباً بك في منصة الوادي</h1>
    <p>استخدم القائمة الجانبية للتنقل بين أقسام المنصة.</p>
</div>

<script>
    // التحقق من وجود المستخدم
    window.addEventListener('DOMContentLoaded', () => {
        if (!localStorage.getItem("currentUser")) {
            window.location.href = "login.html";
        }
    });

    // وظيفة تسجيل الخروج
    function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }
</script>
