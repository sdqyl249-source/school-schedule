<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤية التعليمية - لوحة التحكم</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; overflow: hidden; }

        /* القائمة الجانبية (Sidebar) */
        .sidebar { width: 260px; background-color: #1a237e; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidebar h2 { margin-bottom: 40px; text-align: center; border-bottom: 1px solid #303f9f; padding-bottom: 10px; }
        .nav-item { padding: 15px; color: #cfd8dc; text-decoration: none; cursor: pointer; transition: 0.3s; border-radius: 5px; margin-bottom: 5px; }
        .nav-item:hover { background: #303f9f; color: white; }

        /* منطقة المحتوى الرئيسية */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; }
        .ticker { background: #d32f2f; color: white; padding: 10px; text-align: center; font-weight: bold; }
        
        .container { padding: 25px; }
        
        /* تنسيق الجدول */
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data-table th { background: #1a237e; color: white; padding: 15px; text-align: center; }
        .data-table td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        
        /* أدوات التحكم */
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-add { background: #2196f3; }
        .btn-post { background: #4caf50; }
        .btn-report { background: #673ab7; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 400px; }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <h2>👁️ منصة رؤية</h2>
        <div class="nav-item">🏠 الرئيسية</div>
        <div class="nav-item">🏫 الشعب الدراسية</div>
        <div class="nav-item">📁 المكتبة والملزمات</div>
        <div class="nav-item">⚙️ الإعدادات</div>
    </div>

    <!-- المحتوى -->
    <div class="main-content">
        <div class="ticker">📢 تنويه: تم تفعيل نظام التنبيهات اللحظية لجميع الشعب الدراسية.</div>
        
        <div class="top-bar">
            <h3>لوحة تحكم الشعب والأعضاء</h3>
            <button class="btn btn-add" onclick="alert('إضافة صف جديد')">+ إضافة صف</button>
        </div>

        <div class="container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>تسلسل</th>
                        <th>الصف</th>
                        <th>اسم الشعبة</th>
                        <th>رمز الشعبة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="classes-body">
                    <!-- الصفوف يتم إضافتها هنا -->
                    <tr>
                        <td>1</td>
                        <td>الصف الأول</td>
                        <td>الشعبة (أ)</td>
                        <td>A101</td>
                        <td>
                            <button class="btn btn-post" onclick="postContent()">نشر</button>
                            <button class="btn btn-report">عرض</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function postContent() {
            const content = prompt("أدخل المحتوى (ملزمة، صورة، أو إعلان):");
            if(content) {
                alert("تم إرسال المحتوى: " + content + "\nتم إشعار جميع الطلاب في الشعبة بنجاح!");
            }
        }
    </script>

</body>
</html>
