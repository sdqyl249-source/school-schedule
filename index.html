<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الوادي - إدارة الصفوف</title>
    <link rel="stylesheet" href="classes_style.css"> <!-- تأكد أن هذا الملف يحتوي على تنسيق الخلفية الخضراء -->
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; }
        .page { padding: 30px; text-align: center; }
        .logout-btn { background: #e74c3c; margin-top: 20px; }
    </style>
</head>
<body>

<!-- قسم إدارة الصفوف (يظهر فقط إذا كان المستخدم مسجلاً) -->
<div id="classesSection" class="page" style="display: none;">
    <h1>🏫 إدارة الصفوف</h1>
    <div id="classes-list"></div>
    <button onclick="logout()" class="logout-btn">تسجيل الخروج</button>
</div>

<script>
    // وظيفة تسجيل الخروج
    function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html"; // تأكد من اسم ملف الدخول الخاص بك
    }

    // التحقق من الدخول عند تحميل الصفحة
    window.addEventListener('DOMContentLoaded', () => {
        const userJson = localStorage.getItem("currentUser");
        if (!userJson) {
            window.location.href = "login.html";
        } else {
            document.getElementById("classesSection").style.display = "block";
        }
    });
</script>

</body>
