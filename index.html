<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الوادي - الرئيسية</title>
    <link rel="stylesheet" href="classes_style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f0f2f5; }
        
        /* تنسيق القائمة الجانبية */
        .sidebar { height: 100vh; width: 0; position: fixed; top: 0; right: 0; background: linear-gradient(180deg, #ffffff, #dfe9f3); box-shadow: 0 4px 25px rgba(0,0,0,0.1); transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow: hidden; z-index: 1000; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-title { color: #2c3e50; font-size: 20px; font-weight: bold; padding-bottom: 20px; border-bottom: 2px solid rgba(41, 128, 185, 0.2); margin-bottom: 20px; text-align: center; white-space: nowrap; }
        .menu-item { color: #2c3e50; background: rgba(255, 255, 255, 0.2); border-radius: 12px; margin: 10px 15px; padding: 12px 18px; text-align: center; transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; white-space: nowrap; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 12px #74b9ff; transform: translateY(-3px); }
        .logout-btn { margin-top: auto; padding: 12px; background: rgba(231, 76, 60, 0.1); color: #c0392b; border: 1px solid rgba(231, 76, 60, 0.2); border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; width: 80%; margin: 20px auto; }
        .logout-btn:hover { background: #e74c3c; color: white; }
        .toggle-btn { position: fixed; top: 20px; right: 20px; z-index: 1002; padding: 12px 20px; cursor: pointer; background: #ffffff; color: #2c3e50; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-weight: bold; transition: 0.3s; }
        .main-content { margin-right: 0; padding: 30px; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
    </style>
</head>
<body>

    <button class="toggle-btn" onclick="document.getElementById('mySidebar').style.width = '250px';">☰ القائمة</button>

    <div class="sidebar" id="mySidebar">
        <div class="sidebar-title">🏞️ منصة الوادي</div>
        <div class="menu-item" onclick="location.href='index.html'">🏠 الرئيسية</div>
        <div class="menu-item" onclick="location.href='classes.html'">🏫 إدارة الصفوف</div>
        <button onclick="localStorage.removeItem('currentUser'); window.location.href='login.html';" class="logout-btn">تسجيل الخروج</button>
    </div>

    <div class="main-content">
        <h1>مرحباً بك في منصة الوادي</h1>
    </div>

    <!-- ترتيب تحميل المكتبات والملفات الإجباري -->
    <!-- 1. مكتبات Firebase الأساسية -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <!-- 2. التهيئة المباشرة في HTML لتجنب أي مشاكل في ملفات خارجية -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAuWDpBoR31ZjPzaUrAe4lppufSHuMLFyI",
            authDomain: "roya-platform-26860.firebaseapp.com",
            databaseURL: "https://roya-platform-26860-default-rtdb.firebaseio.com",
            projectId: "roya-platform-26860",
            storageBucket: "roya-platform-26860.appspot.com",
            messagingSenderId: "897544406776",
            appId: "1:897544406776:web:aa112013dea672fb141d0d"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // تعريف window.database بشكل صريح ومباشر
        window.database = firebase.database();
        console.log("تم تعريف window.database بنجاح داخل index.html مباشرة!");
    </script>

    <!-- 3. ملفاتك التشغيلية -->
    <script src="global.js"></script>
    <script src="scriot.js"></script>
    <script src="classes.js?v=1000"></script>
</body>
</html>
