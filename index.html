<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤية - النظام المتكامل</title>
    <!-- استدعاء المكتبات -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; overflow: hidden; }

        /* القائمة الجانبية (Sidebar) */
        .sidebar { width: 280px; background-color: #1a237e; color: white; padding: 25px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar-logo { text-align: center; margin-bottom: 40px; font-weight: bold; font-size: 26px; border-bottom: 1px solid #3949ab; padding-bottom: 20px; }
        .nav-item { padding: 18px; cursor: pointer; border-radius: 12px; margin-bottom: 15px; transition: 0.3s; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background-color: #3949ab; }
        .active { background-color: #3949ab; border-right: 4px solid #fff; }

        /* المنطقة الرئيسية */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background-color: #fcf9f5; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* الجدول الاحترافي */
        .table-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #1a237e; color: white; padding: 15px; text-align: center; font-size: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; color: #333; }
        tr:hover { background-color: #f9f9f9; }
        
        /* الأزرار والأدوات */
        .btn-add { background-color: #2196f3; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .btn-add:hover { background-color: #1976d2; }
        .btn-action { padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; margin: 0 3px; background: white; transition: 0.2s; }
        .btn-action:hover { background: #f0f0f0; }
        .btn-report { background-color: #7b1fa2; color: white; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <div class="sidebar-logo">منصة رؤية</div>
        <div class="nav-item active">📋 قائمة الطلبة</div>
        <div class="nav-item">📅 الجدول الدراسي</div>
        <div class="nav-item">💰 المبيعات والمكتبة</div>
        <div class="nav-item">⚙️ إعدادات النظام</div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="header-bar">
            <h2>سجل بيانات الطلبة</h2>
            <button class="btn-add">+ إضافة طالب جديد</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>تسلسل</th>
                        <th>الاسم الكامل</th>
                        <th>رقم الملف</th>
                        <th>العمر</th>
                        <th>الجنس</th>
                        <th>رقم الهاتف</th>
                        <th>العنوان</th>
                        <th>تقرير</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="data-body">
                    <!-- سيتم ملء البيانات ديناميكياً -->
                    <tr>
                        <td>1</td>
                        <td>محمد علي حسن</td>
                        <td>101</td>
                        <td>15</td>
                        <td>ذكر</td>
                        <td>07701234567</td>
                        <td>بغداد / المنصور</td>
                        <td><button class="btn-report">تقرير</button></td>
                        <td>
                            <button class="btn-action">👁️</button>
                            <button class="btn-action">✏️</button>
                            <button class="btn-action">🗑️</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // هنا يمكن ربط Firebase أو إضافة الوظائف التفاعلية
        console.log("منصة رؤية - النظام يعمل بكفاءة");
    </script>
</body>
</html>
