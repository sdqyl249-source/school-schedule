<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤية التعليمية</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }

        /* شريط التبليغات */
        .ticker { background: #d32f2f; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; overflow: hidden; white-space: nowrap; }

        /* البطاقات الإحصائية */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* لوحة الإدارة */
        .admin-panel { background: #e8eaf6; padding: 20px; border-radius: 10px; border: 2px dashed #1a237e; margin-bottom: 20px; display: none; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: #1a237e; color: white; margin: 5px; }

        /* الشعب والنجوم */
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        
        /* تنسيق الاقتراحات */
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 2. التبليغات العاجلة -->
    <div class="ticker">📢 تنبيه: موعد امتحانات نصف السنة اقترب، يرجى متابعة جداول الشعب الخاصة بكم.</div>

    <!-- 1. الملخص الرقمي -->
    <div class="stats-grid">
        <div class="stat-card"><h3>الطلبة</h3><p>150</p></div>
        <div class="stat-card"><h3>دروس اليوم</h3><p>6</p></div>
        <div class="stat-card"><h3>التبليغات</h3><p>4</p></div>
        <div class="stat-card"><h3>الشعب</h3><p>8</p></div>
    </div>

    <!-- 4. لوحة الإجراءات (تظهر للأعضاء فقط) -->
    <div class="admin-panel" id="adminPanel">
        <h3>⚙️ أدوات الإدارة</h3>
        <button class="btn" onclick="alert('فتح نافذة نشر تبليغ')">نشر تبليغ</button>
        <button class="btn" onclick="alert('رفع ملف PDF')">رفع ملازم (PDF)</button>
    </div>

    <div class="grid-layout">
        <!-- 3 & 5. الجداول والنجوم -->
        <div>
            <div class="card">
                <h3>📅 حصص اليوم</h3>
                <p>الرياضيات (شعبة أ) - 08:30 ص</p>
                <button class="btn">عرض الجدول الكامل</button>
            </div>
            <div class="card">
                <h3>⭐ نجوم الأسبوع</h3>
                <p>الطالب: محمد علي - متميز في النشاط الأكاديمي</p>
            </div>
        </div>

        <!-- 6. صندوق الاقتراحات -->
        <div class="card">
            <h3>📩 تواصل معنا</h3>
            <input type="text" placeholder="اسمك (اختياري)">
            <textarea placeholder="رسالتك..."></textarea>
            <button class="btn" style="width:100%">إرسال</button>
        </div>
    </div>
</div>

<script>
    // لمحاكاة تسجيل دخول العضو:
    // في الواقع، هذا سيتحقق من حالة المصادقة في Firebase
    const isAdmin = true; // قم بتغييرها إلى false لاختبار إخفاء اللوحة
    if(isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
    }
</script>

</body>
</html>
