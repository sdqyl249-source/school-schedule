<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤية التعليمية - لوحة التحكم</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>
    <style>
        :root { --main-blue: #1a237e; --sidebar-bg: #0d1b2a; --bg-color: #f8f9fa; --accent: #4cc9f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg-color); }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 30px; text-align: center; font-size: 22px; font-weight: bold; border-bottom: 1px solid #1b263b; }
        .menu-item { padding: 20px; cursor: pointer; transition: 0.3s; border-right: 4px solid transparent; }
        .menu-item:hover { background: #1b263b; border-right: 4px solid var(--accent); }
        .sidebar-footer { margin-top: auto; padding: 20px; background: #1b263b; cursor: pointer; text-align: center; font-weight: bold; }
        
        /* Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .page { display: none; }
        .active { display: block; }
        .admin-only { display: none; } /* يظهر للأستاذ فقط */
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; background: var(--main-blue); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">👁️ منصة رؤية</div>
        <div class="menu-item" onclick="show('home')">🏠 الرئيسية</div>
        <div class="menu-item" onclick="show('classes')">🏫 الشعب الدراسية</div>
        <div class="menu-item" onclick="show('schedule')">📅 جدول الدروس</div>
        <div class="menu-item" onclick="show('honor')">🏆 لوحة الشرف</div>
        <div class="menu-item" onclick="show('complaints')">📩 الشكاوي</div>
        <div class="sidebar-footer" id="authBtn" onclick="toggleAuth()">🔐 تسجيل الدخول</div>
    </div>

    <div class="content">
        <!-- الرئيسية -->
        <div id="home" class="page active">
            <div class="card">
                <h3>📢 التبليغات اللحظية</h3>
                <div id="news-display" style="font-weight: bold; margin: 15px 0;">لا توجد تبليغات حالية.</div>
                <button class="btn admin-only" onclick="addNews()">+ تحديث التبليغ</button>
            </div>
        </div>

        <!-- الشعب الدراسية -->
        <div id="classes" class="page">
            <div class="card">
                <h3>قائمة الشعب</h3>
                <table width="100%" border="1" cellpadding="10" style="border-collapse: collapse; margin-top: 15px;">
                    <tr><th>الصف</th><th>الشعبة</th><th class="admin-only">الرمز</th><th>إجراء</th></tr>
                    <tr><td>الأول</td><td>(أ)</td><td class="admin-only">A101</td><td><button>عرض</button></td></tr>
                </table>
            </div>
        </div>

        <!-- الجدول -->
        <div id="schedule" class="page"><div class="card"><h3>📅 جدول الدروس</h3><p>لا يوجد جدول مضاف حالياً.</p></div></div>

        <!-- لوحة الشرف -->
        <div id="honor" class="page">
            <div class="card" id="cert">
                <h2>شهادة تقدير</h2>
                <input type="text" id="stuName" placeholder="اسم الطالب (للأساتذة فقط)" disabled style="padding:5px; width:100%;">
                <button class="btn" onclick="downloadCert()">تحميل PDF للجميع</button>
            </div>
        </div>

        <!-- الشكاوي -->
        <div id="complaints" class="page">
            <div class="card">
                <h3>📩 صندوق الشكاوي</h3>
                <textarea id="compText" style="width:100%; height:80px;"></textarea>
                <button class="btn" onclick="sendComplaint()">إرسال</button>
                <div id="complaints-list" class="admin-only" style="margin-top: 20px;">
                    <button class="btn" onclick="viewComplaints()">تحديث قائمة الشكاوي</button>
                    <div id="list-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleAuth() {
            isAdmin = !isAdmin;
            document.getElementById('authBtn').innerText = isAdmin ? "🔓 تسجيل الخروج" : "🔐 تسجيل الدخول";
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            document.getElementById('stuName').disabled = !isAdmin;
        }

        function addNews() {
            const newsText = prompt("اكتب التبليغ الجديد:");
            if(newsText) {
                const date = new Date().toLocaleString('ar-IQ');
                localStorage.setItem("news", JSON.stringify({text: newsText, date: date}));
                renderNews();
            }
        }

        function renderNews() {
            const news = JSON.parse(localStorage.getItem("news"));
            if(news) document.getElementById("news-display").innerHTML = `${news.text} <br><small style="color:gray">${news.date}</small>`;
        }

        function sendComplaint() {
            let comps = JSON.parse(localStorage.getItem("complaints") || "[]");
            comps.push({text: document.getElementById("compText").value, date: new Date().toLocaleString('ar-IQ')});
            localStorage.setItem("complaints", JSON.stringify(comps));
            alert("تم الإرسال!");
        }

        function viewComplaints() {
            let comps = JSON.parse(localStorage.getItem("complaints") || "[]");
            document.getElementById("list-content").innerHTML = comps.map(c => `<p style="border-bottom:1px solid #ccc">${c.text} (${c.date})</p>`).join('');
        }

        function downloadCert() {
            html2pdf().from(document.getElementById('cert')).save('شهادة_تقدير.pdf');
        }

        window.onload = renderNews;
    </script>
</body>
</html>
