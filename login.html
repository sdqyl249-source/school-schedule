<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - منصة الوادي</title>
    <link rel="stylesheet" href="classes_style.css">
</head>
<body class="login-page">

    <div class="login-container">
    <h2>مرحباً بك في منصة الوادي</h2>
    <input type="text" id="userName" placeholder="الاسم الثلاثي">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف">
    
    <select id="userRole">
        <option value="student">طالب</option>
        <option value="teacher">أستاذ</option>
    </select>

    <button onclick="performLogin()">تسجيل الدخول</button>
</div>

    <script>
        function performLogin() {
            const name = document.getElementById("userName").value;
            const phone = document.getElementById("userPhone").value;
            const role = document.getElementById("userRole").value;

            if (name && phone) {
                // حفظ البيانات في LocalStorage ليتم التعرف على المستخدم في كل الصفحات
                localStorage.setItem("userRole", role);
                localStorage.setItem("userName", name);
                localStorage.setItem("userPhone", phone);

                alert("مرحباً بك يا " + name);
                window.location.href = "index.html"; // التوجه للرئيسية
            } else {
                alert("يرجى إدخال البيانات كاملة");
            }
        }
        // دالة إنشاء حساب جديد وتخزينه
function registerUser(fullName, phone, role) {
    const userProfile = {
        name: fullName,
        phone: phone,
        role: role, // 'admin', 'teacher', أو 'student'
        joinedClasses: [] // قائمة الصفوف التي ينضم إليها لاحقاً
    };
    
    // تحويل الكائن إلى نص وحفظه في التخزين الدائم
    localStorage.setItem("currentUser", JSON.stringify(userProfile));
    
    alert("أهلاً بك يا " + fullName + "، تم إنشاء حسابك بنجاح.");
}
    </script>
</body>
</html>
