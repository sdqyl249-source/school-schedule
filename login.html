<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الوادي التعليمية</title>
    <!-- أيقونة المنصة -->
    <link rel="icon" type="image/png" href="icona99.png">
    <link rel="apple-touch-icon" href="icona99.png">
    <!-- FontAwesome الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121824;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* الحاوية الدائرية المتحركة للخلفية */
        .login-container {
            position: relative;
            width: 380px;
            height: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الإطار الدائري المتحرك للشرطات */
        .circle-animation {
            position: absolute;
            width: 440px;
            height: 440px;
            border-radius: 50%;
            animation: rotateRing 15s linear infinite;
            pointer-events: none;
        }

        .circle-animation span {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 4px;
            background: #2a3b5c;
            transform-origin: -210px center;
            border-radius: 2px;
        }

        /* تلوين بعض الشرطات بشكل مضيء متحرك */
        .circle-animation span:nth-child(-n+8) {
            background: #f6ad55;
            box-shadow: 0 0 10px #f6ad55, 0 0 20px #f6ad55;
        }

        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* بطاقة تسجيل الدخول الداخلية */
        .login-card {
            position: relative;
            background: #182232;
            width: 340px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 10;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .login-card h2 {
            color: #f6ad55;
            margin-bottom: 25px;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #718096;
            font-size: 15px;
        }

        .input-field {
            width: 100%;
            padding: 13px 45px 13px 15px;
            background: #121824;
            border: 1px solid #2a3b5c;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #f6ad55;
            box-shadow: 0 0 8px rgba(246, 173, 85, 0.3);
        }

        .select-field {
            width: 100%;
            padding: 13px 45px 13px 15px;
            background: #121824;
            border: 1px solid #2a3b5c;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #f6ad55, #dd6b20);
            color: #fff;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(221, 107, 32, 0.4);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #dd6b20, #c05621);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 13px;
            color: #a0aec0;
        }

        .toggle-text a {
            color: #f6ad55;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #e53e3e;
            font-size: 12px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- الإطار المتحرك بالشرطات المضيئة -->
        <div class="circle-animation" id="circleRing"></div>

        <!-- بطاقة تسجيل الدخول -->
        <div class="login-card">
            <h2 id="formTitle">LOGIN</h2>
            
            <div class="error-msg" id="errorMsg">يرجى ملء الحقول المطلوبة</div>

            <form onsubmit="handleAuth(event)">
                <!-- حقل الاسم (يظهر عند التسجيل) -->
                <div class="input-group" id="nameGroup" style="display:none;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="fullName" class="input-field" placeholder="الاسم الكامل...">
                </div>

                <!-- البريد أو الهاتف -->
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="identifier" class="input-field" placeholder="البريد أو رقم الهاتف..." required>
                </div>

                <!-- اختيار الصفة (يظهر عند التسجيل) -->
                <div id="roleGroup" style="display:none;">
                    <select id="userRole" class="select-field">
                        <option value="طالب">طالب</option>
                        <option value="الأستاذ">أستاذ / معلم</option>
                        <option value="المدير">مدير المنصة</option>
                    </select>
                </div>

                <!-- الرمز السري أو كود المدير ahmed2026 -->
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="secretCode" class="input-field" placeholder="الرمز السري (ahmed2026 للمدير)..." required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">LOGIN</button>
            </form>

            <div class="toggle-text">
                <span id="toggleTextInfo">ليس لديك حساب؟</span> 
                <a onclick="switchMode()" id="toggleLink">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        // توليد الشرطات الدائرية برمجياً لإعطاء حركة الإطار المضيء
        const ring = document.getElementById('circleRing');
        const totalSpokes = 36;
        for (let i = 0; i < totalSpokes; i++) {
            const span = document.createElement('span');
            span.style.transform = `rotate(${i * (360 / totalSpokes)}deg)`;
            ring.appendChild(span);
        }

        let isRegister = false;

        function switchMode() {
            isRegister = !isRegister;
            const nameGroup = document.getElementById('nameGroup');
            const roleGroup = document.getElementById('roleGroup');
            const formTitle = document.getElementById('formTitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleTextInfo = document.getElementById('toggleTextInfo');
            const toggleLink = document.getElementById('toggleLink');

            if (isRegister) {
                nameGroup.style.display = 'block';
                roleGroup.style.display = 'block';
                formTitle.innerText = 'SIGN UP';
                submitBtn.innerText = 'SIGN UP';
                toggleTextInfo.innerText = 'لديك حساب بالفعل؟';
                toggleLink.innerText = 'Login';
            } else {
                nameGroup.style.display = 'none';
                roleGroup.style.display = 'none';
                formTitle.innerText = 'LOGIN';
                submitBtn.innerText = 'LOGIN';
                toggleTextInfo.innerText = 'ليس لديك حساب؟';
                toggleLink.innerText = 'Sign Up';
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            const identifier = document.getElementById('identifier').value.trim();
            const secretCode = document.getElementById('secretCode').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const roleSelect = document.getElementById('userRole').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!identifier || !secretCode) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'يرجى إدخال البيانات المطلوبة';
                return;
            }

            let finalRole = roleSelect;
            let finalName = fullName || identifier;

            // تحديد تلقائي لصلاحية المدير عبر الرمز الحصري ahmed2026
            if (secretCode === 'ahmed2026') {
                finalRole = 'المدير';
            } else if (isRegister && !fullName) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'يرجى إدخال الاسم الكامل';
                return;
            } else if (!isRegister) {
                const existing = localStorage.getItem("currentUser");
                if (existing) {
                    try {
                        const parsed = JSON.parse(existing);
                        if (parsed.identifier === identifier) {
                            finalRole = parsed.role;
                            finalName = parsed.name;
                        }
                    } catch(e) {}
                }
            }

            // حفظ الجلسة لتبقى نشطة ولا تظهر شاشة التسجيل مرة أخرى
            const userData = {
                name: finalName,
                identifier: identifier,
                role: finalRole,
                code: secretCode
            };

            localStorage.setItem("currentUser", JSON.stringify(userData));
            window.location.href = 'index.html';
        }

        // تخطي شاشة الدخول التلقائي إذا كان المستخدم مسجلاً مسبقاً
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem("currentUser");
            if (currentUser) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
