<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - منصة الوادي</title>
    <link rel="stylesheet" href="classes_style.css">
</head>
<body class="login-page">

    <div class="login-container">
    <h2>مرحباً بك في منصة الوادي</h2>
    <input type="text" id="userName" placeholder="الاسم الثلاثي">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف">
    
    <select id="userRole">
        <option value="student">طالب</option>
        <option value="teacher">أستاذ</option>
    </select>

    <button onclick="performLogin()">تسجيل الدخول</button>
</div>
   <script>
    function performLogin() {
        const name = document.getElementById("userName").value;
        const phone = document.getElementById("userPhone").value;
        const role = document.getElementById("userRole").value;

        if (name && phone) {
            // استدعاء دالة تسجيل الحساب الموحد
            registerUser(name, phone, role);
            
            // التوجه للرئيسية
            window.location.href = "index.html"; 
        } else {
            alert("يرجى إدخال البيانات كاملة");
        }
    }

    // الدالة الموحدة لحفظ البيانات
    function registerUser(fullName, phone, role) {
        const userProfile = {
            name: fullName,
            phone: phone,
            role: role, 
            joinedClasses: [] 
        };
        
        // حفظ الكائن بالكامل تحت مفتاح واحد يسمى "currentUser"
        localStorage.setItem("currentUser", JSON.stringify(userProfile));
    }
</script>
</body>
</html>
