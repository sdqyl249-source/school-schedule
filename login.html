<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - منصة الوادي</title>
    <link rel="stylesheet" href="classes_style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <h2>مرحباً بك في منصة الوادي</h2>
        <input type="text" id="userName" placeholder="الاسم الثلاثي">
        <input type="tel" id="userPhone" placeholder="رقم الهاتف">
        
        <select id="userRole">
            <option value="student">طالب</option>
            <option value="teacher">أستاذ</option>
        </select>

        <button onclick="performLogin()">تسجيل الدخول</button>
    </div>

    <script>
        function performLogin() {
            const name = document.getElementById("userName").value.trim();
            const phone = document.getElementById("userPhone").value.trim();
            const role = document.getElementById("userRole").value;

            // التحقق من أن الحقول ليست فارغة
            if (name === "" || phone === "") {
                alert("يرجى إدخال الاسم ورقم الهاتف.");
                return;
            }

            // إنشاء ملف تعريف المستخدم (User Profile)
            const userProfile = {
                name: name,
                phone: phone,
                role: role,
                joinedClasses: [] // مصفوفة فارغة جاهزة لاستقبال رموز الصفوف لاحقاً
            };

            // حفظ المستخدم في الذاكرة الدائمة
            localStorage.setItem("currentUser", JSON.stringify(userProfile));

            alert("أهلاً بك يا " + name + "، تم تفعيل حسابك كـ " + (role === 'student' ? 'طالب' : 'أستاذ'));
            
            // التوجه للرئيسية
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
