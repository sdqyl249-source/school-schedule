<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الوادي التعليمية</title>
    <link rel="icon" type="image/png" href="icona99.png">
    <link rel="apple-touch-icon" href="icona99.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{padding:0;margin:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}
        section{position:relative;display:flex;justify-content:center;align-items:center;width:100%;height:100vh;overflow:hidden;background-color:#121824;}
        section .bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;pointer-events:none;}
        section .trees{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:100;pointer-events:none;}
        section .girl{position:absolute;scale:0.65;pointer-events:none;animation:animateGirl 10s linear infinite;}
        @keyframes animateGirl{0%{transform:translateX(calc(100% + 100vw));}50%{transform:translateX(calc(-100% - 100vw));}50.01%{transform:translateX(calc(-100% - 100vw)) rotateY(180deg);}100%{transform:translateX(calc(100% + 100vw)) rotateY(180deg);}}
        .login{position:relative;padding:40px 30px;background:rgba(255,255,255,0.25);backdrop-filter:blur(15px);border:1px solid #fff;border-bottom:1px solid rgba(255,255,255,0.5);border-right:1px solid rgba(255,255,255,0.5);border-radius:24px;width:400px;display:flex;flex-direction:column;gap:20px;box-shadow:0 25px 50px rgba(0,0,0,0.2);z-index:101;}
        .login h2{position:relative;width:100%;text-align:center;font-size:2.2rem;font-weight:600;color:#f6ad55;margin-bottom:5px;}
        .input-group{position:relative;margin-bottom:5px;}
        .input-group i{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:#718096;font-size:15px;}
        .input-field{width:100%;padding:13px 45px 13px 15px;background:#121824;border:1px solid #2a3b5c;border-radius:12px;color:#fff;font-size:14px;box-sizing:border-box;outline:none;transition:0.3s;}
        .input-field:focus{border-color:#f6ad55;box-shadow:0 0 8px rgba(246, 173, 85, 0.3);}
        .select-field{width:100%;padding:13px 45px 13px 15px;background:#121824;border:1px solid #2a3b5c;border-radius:12px;color:#fff;font-size:14px;box-sizing:border-box;outline:none;cursor:pointer;margin-bottom:5px;}
        .submit-btn{background:linear-gradient(135deg,#f6ad55,#dd6b20);color:#fff;border:none;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.3s;box-shadow:0 4px 15px rgba(221,107,32,0.4);margin-top:5px;}
        .submit-btn:hover{transform:translateY(-2px);background:linear-gradient(135deg,#dd6b20,#c05621);}
        .toggle-text{margin-top:10px;font-size:13px;color:#a0aec0;text-align:center;}
        .toggle-text a{color:#f6ad55;text-decoration:none;font-weight:bold;cursor:pointer;}
        .toggle-text a:hover{text-decoration:underline;}
        .error-msg{color:#e53e3e;font-size:12px;margin-bottom:5px;display:none;text-align:center;}
        .leaves{position:absolute;width:100%;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;z-index:1;pointer-events:none;}
        .leaves .set{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;}
        .leaves .set div{position:absolute;display:block;}
        .leaves .set div:nth-child(1){left:20%;animation:animate 20s linear infinite;}
        .leaves .set div:nth-child(2){left:50%;animation:animate 14s linear infinite;}
        .leaves .set div:nth-child(3){left:70%;animation:animate 12s linear infinite;}
        .leaves .set div:nth-child(4){left:5%;animation:animate 15s linear infinite;}
        .leaves .set div:nth-child(5){left:85%;animation:animate 18s linear infinite;}
        .leaves .set div:nth-child(6){left:90%;animation:animate 12s linear infinite;}
        .leaves .set div:nth-child(7){left:15%;animation:animate 14s linear infinite;}
        .leaves .set div:nth-child(8){left:60%;animation:animate 15s linear infinite;}
        @keyframes animate{0%{opacity:0;top:-10%;transform:translateX(20px) rotate(0deg);}10%{opacity:1;}20%{transform:translateX(-20px) rotate(45deg);}40%{transform:translateX(-20px) rotate(90deg);}60%{transform:translateX(20px) rotate(180deg);}80%{transform:translateX(-20px) rotate(45deg);}100%{top:110%;transform:translateX(20px) rotate(255deg);}}
    </style>
</head>
<body>
    <section>
        <div class="leaves">
            <div class="set">
                <div><img decoding="async" src="./images/leaf_01.png" alt="leaf 01"></div>
                <div><img decoding="async" src="./images/leaf_02.png" alt="leaf 02"></div>
                <div><img decoding="async" src="./images/leaf_03.png" alt="leaf 03"></div>
                <div><img decoding="async" src="./images/leaf_04.png" alt="leaf 04"></div>
                <div><img decoding="async" src="./images/leaf_01.png" alt="leaf 01"></div>
                <div><img decoding="async" src="./images/leaf_02.png" alt="leaf 02"></div>
                <div><img decoding="async" src="./images/leaf_03.png" alt="leaf 03"></div>
                <div><img decoding="async" src="./images/leaf_04.png" alt="leaf 04"></div>
            </div>
        </div>
        <img decoding="async" src="./images/bg.jpg" class="bg" alt="bg">
        <img decoding="async" src="./images/girl.png" class="girl" alt="girl">
        <img decoding="async" src="./images/trees.png" class="trees" alt="trees">

        <div class="login">
            <h2 id="formTitle">LOGIN</h2>
            
            <div class="error-msg" id="errorMsg">يرجى ملء الحقول المطلوبة</div>

            <form onsubmit="handleAuth(event)">
                <div class="input-group" id="nameGroup" style="display:none;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="fullName" class="input-field" placeholder="الاسم الكامل...">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="identifier" class="input-field" placeholder="البريد أو رقم الهاتف..." required>
                </div>

                <div id="roleGroup" style="display:none;">
                    <select id="userRole" class="select-field">
                        <option value="طالب">طالب</option>
                        <option value="الأستاذ">أستاذ / معلم</option>
                        <option value="المدير">مدير المنصة</option>
                    </select>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="secretCode" class="input-field" placeholder="الرمز السري..." required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">LOGIN</button>
            </form>

            <div class="toggle-text">
                <span id="toggleTextInfo">ليس لديك حساب؟</span> 
                <a onclick="switchMode()" id="toggleLink">Sign Up</a>
            </div>
        </div>
    </section>

    <script>
        let isRegister = false;

        function switchMode() {
            isRegister = !isRegister;
            const nameGroup = document.getElementById('nameGroup');
            const roleGroup = document.getElementById('roleGroup');
            const formTitle = document.getElementById('formTitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleTextInfo = document.getElementById('toggleTextInfo');
            const toggleLink = document.getElementById('toggleLink');

            if (isRegister) {
                nameGroup.style.display = 'block';
                roleGroup.style.display = 'block';
                formTitle.innerText = 'SIGN UP';
                submitBtn.innerText = 'SIGN UP';
                toggleTextInfo.innerText = 'لديك حساب بالفعل؟';
                toggleLink.innerText = 'Login';
            } else {
                nameGroup.style.display = 'none';
                roleGroup.style.display = 'none';
                formTitle.innerText = 'LOGIN';
                submitBtn.innerText = 'LOGIN';
                toggleTextInfo.innerText = 'ليس لديك حساب؟';
                toggleLink.innerText = 'Sign Up';
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            const identifier = document.getElementById('identifier').value.trim();
            const secretCode = document.getElementById('secretCode').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const roleSelect = document.getElementById('userRole').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!identifier || !secretCode) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'يرجى إدخال البيانات المطلوبة';
                return;
            }

            let finalRole = roleSelect;
            let finalName = fullName || identifier;

            if (secretCode === 'ahmed2026') {
                finalRole = 'المدير';
            } else if (secretCode === 'teacher2026') {
                finalRole = 'الأستاذ';
            } else if (isRegister) {
                if (!fullName) {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = 'يرجى إدخال الاسم الكامل';
                    return;
                }
                finalRole = roleSelect;
            } else {
                const existing = localStorage.getItem("currentUser");
                if (existing) {
                    try {
                        const parsed = JSON.parse(existing);
                        if (parsed.identifier === identifier) {
                            finalRole = parsed.role;
                            finalName = parsed.name;
                        }
                    } catch(e) {}
                }
            }

            const userData = {
                name: finalName,
                identifier: identifier,
                role: finalRole,
                code: secretCode
            };

            localStorage.setItem("currentUser", JSON.stringify(userData));
            window.location.href = 'index.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem("currentUser");
            if (currentUser) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
