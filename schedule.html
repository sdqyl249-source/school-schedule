<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جدول الدروس</title>
    <style>
    /* الإعدادات العامة */
    body { 
        font-family: 'Segoe UI', Tahoma, sans-serif; 
        background-color: #f8f9fa; 
        padding: 20px; 
        color: #333;
    }

    /* تنسيق الكارد */
    .card { 
        background: white; 
        padding: 20px; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        margin-bottom: 20px; 
    }

    /* تنسيق الجدول */
    table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 15px; 
        background: white;
    }
    th { 
        background-color: #3498db; 
        color: white; 
        padding: 12px; 
    }
    td { 
        border: 1px solid #eee; 
        padding: 10px; 
        text-align: center; 
    }
    tr:hover { background-color: #f1f1f1; }

    /* تنسيق الأزرار */
    .btn { 
        padding: 10px 20px; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
        color: white; 
        font-weight: bold;
        transition: 0.3s;
    }
    .btn:hover { opacity: 0.8; transform: translateY(-1px); }

    /* لوحة التحكم */
    .admin-panel { 
        background: #fff; 
        padding: 20px; 
        border-radius: 10px; 
        border: 2px solid #3498db; 
        margin-top: 20px; 
    }

    /* تنسيق خاص للطباعة */
    @media print {
        .nav-btns, .admin-panel, .btn { display: none !important; }
        .card { box-shadow: none; border: 1px solid #ccc; }
        body { background: white; }
    }
        @media print {
    .nav-btns, .admin-panel, .btn {
        display: none !important; /* إخفاء الأزرار عند الطباعة */
    }
    .card {
        box-shadow: none;
        border: none;
    }
    body { background: white; }
}
</style>
</head>
<body>
    <!-- شريط التنقل العلوي المحدث -->
<div class="nav-btns">
    <button class="btn" style="background:var(--primary)" onclick="login()">دخول الإدارة</button>
    <button class="btn" id="logoutBtn" style="background:var(--danger); display:none;" onclick="logout()">خروج</button>
    
    <!-- زر الطباعة مع التنسيق الجديد -->
    <button class="btn btn-print" onclick="window.print()">🖨️ طباعة الجدول</button>
    
    <a href="index.html" class="btn" style="background:#34495e; text-decoration:none;">🏠 العودة للرئيسية</a>
</div>

<!-- محتوى الجدول -->
<div class="card">
    <h3>📅 جدول الدروس المدرسي</h3>
    <div id="app"></div>
</div>

<!-- لوحة التحكم (تظهر للمدير فقط) -->
<div class="admin-panel" id="adminPanel">
    <select id="selG">
        <option value="الأول">الأول</option><option value="الثاني">الثاني</option>
        <option value="الثالث">الثالث</option><option value="الرابع">الرابع</option>
        <option value="الخامس">الخامس</option><option value="السادس">السادس</option>
    </select>
    <select id="selS">
        <option value="أ">أ</option><option value="ب">ب</option><option value="ج">ج</option>
    </select>
    <button class="btn" style="background:var(--success)" onclick="addTable()">➕ إضافة جدول</button>
</div>

<!-- مكتبات Firebase والسكربت -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="scriot.js"></script>
<script>
    // عند تحميل الصفحة، تحقق من مستوى المستخدم فوراً
    document.addEventListener('DOMContentLoaded', () => {
        const level = localStorage.getItem("userLevel");
        if (level === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("logoutBtn").style.display = "inline-block";
        }
    });
    // دالة الدخول
    function login() {
        const code = prompt("يرجى إدخال رمز الدخول:");
        if (code === "ahmed") {
            localStorage.setItem("userLevel", "admin");
            location.reload();
        } else if (code === "2026") {
            localStorage.setItem("userLevel", "member");
            alert("تم الدخول كعضو");
            location.reload();
        } else {
            localStorage.setItem("userLevel", "visitor");
            alert("رمز خاطئ!");
        }
    }
    // دالة الخروج
    function logout() {
        localStorage.removeItem("userLevel");
        location.reload();
    }
</script>
</body>
</html>
