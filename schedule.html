<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤية - النظام المدرسي</title>
    <!-- يمكنك وضع تنسيق CSS الخاص بك هنا -->
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

<div class="nav-btns">
    <button class="btn" style="background:#5e72e4" onclick="login()">دخول الإدارة</button>
    <button class="btn" id="logoutBtn" style="background:#e74c3c; display:none;" onclick="logout()">خروج</button>
    <button class="btn" style="background:#27ae60" onclick="window.print()">🖨️ طباعة الجدول</button>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
    <select id="selG"><option>الأول</option><option>الثاني</option><option>الثالث</option><option>الرابع</option></select>
    <select id="selS"><option>أ</option><option>ب</option></select>
    <button class="btn" style="background:#2dce89" onclick="addTable()">➕ إضافة</button>
    <button class="btn" style="background:#e67e22" onclick="deleteTable()">🗑️ حذف</button>
</div>

<div id="app"></div>

<!-- مكتبات Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<!-- ملف التشغيل الرئيسي -->
<script src="main.js"></script>
</body>
</html>
