<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية - جدول الحصص</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* التنسيقات الأساسية */
        body { font-family: 'Cairo', sans-serif; padding-top: 100px; background: #f3f4f6; }
        .main-header { position: fixed; top: 0; right: 0; width: 100%; height: 80px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 2000; box-sizing: border-box; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { flex: 0 0 500px; margin: 15px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .badge { display: inline-block; background: #4f46e5; color: white; padding: 5px 15px; border-radius: 10px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background: #4f46e5; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 10px; }
        .info-txt { min-height: 20px; outline: none; }
        .sidebar { position: fixed; top: 80px; right: -360px; width: 320px; height: 100vh; background: #fff; box-shadow: -5px 0 25px rgba(0,0,0,0.1); transition: 0.4s; z-index: 1500; padding: 20px; }
        .sidebar.open { right: 0; }
        .sidebar-toggle { cursor: pointer; font-size: 24px; border: none; background: none; }
        .hidden { display: none !important; }
        .toast { position: fixed; top: 20px; left: 20px; padding: 15px; background: #16a34a; color: white; border-radius: 8px; z-index: 9999; }
    </style>
</head>
<body>

<header class="main-header">
    <h1>منصة رؤية <span>- الجدول</span></h1>
    <button class="sidebar-toggle" onclick="toggleSidebar()">⚙️</button>
</header>

<div id="toastContainer"></div>

<div class="container" id="schedule"></div>

<div id="sidebar" class="sidebar">
    <h3>إعدادات الجدول</h3>
    <select id="serviceSelect">
        <option value="addLesson">➕ إضافة حصة</option>
        <option value="deleteLesson">🗑️ حذف حصة</option>
    </select>
    <br><br>
    <select id="serviceClassSelect">
        <option>الأول</option><option>الثاني</option><option>الثالث</option>
    </select>
    <select id="serviceSectionSelect">
        <option>أ</option><option>ب</option>
    </select>
    <button onclick="executeService()" style="width:100%; padding:10px; margin-top:10px;">تنفيذ</button>
</div>

<script>
    let lessons = JSON.parse(localStorage.getItem("scheduleData")) || {};
    const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"];
    let classSections = [{className: "الأول", section: "أ"}, {className: "الثاني", section: "أ"}];

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }

    function renderSchedule() {
        const container = document.getElementById("schedule");
        container.innerHTML = "";
        classSections.forEach(sec => {
            const key = `${sec.className}-${sec.section}`;
            if (!lessons[key]) lessons[key] = Array(4).fill(null).map(() => Array(5).fill({subject: "", teacher: ""}));
            
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<div class="badge">${sec.className} - ${sec.section}</div><table><thead><tr><th>حصة</th>${days.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody></tbody></table>`;
            
            const tbody = card.querySelector("tbody");
            for(let i=0; i<4; i++) {
                let row = `<tr><td>${i+1}</td>`;
                days.forEach((_, dIdx) => {
                    row += `<td>
                        <div class="info-txt subject" contenteditable="true" data-key="${key}" data-row="${i}" data-day="${dIdx}">${lessons[key][i][dIdx].subject}</div>
                        <div class="info-txt teacher" contenteditable="true" data-key="${key}" data-row="${i}" data-day="${dIdx}">${lessons[key][i][dIdx].teacher}</div>
                    </td>`;
                });
                tbody.innerHTML += row + "</tr>";
            }
            container.appendChild(card);
        });
    }

    // حفظ البيانات تلقائياً
    document.getElementById("schedule").addEventListener("input", (e) => {
        if (!e.target.classList.contains("info-txt")) return;
        const {key, row, day} = e.target.dataset;
        if(e.target.classList.contains("subject")) lessons[key][row][day].subject = e.target.innerText;
        else lessons[key][row][day].teacher = e.target.innerText;
        localStorage.setItem("scheduleData", JSON.stringify(lessons));
    });

    function executeService() {
        const service = document.getElementById("serviceSelect").value;
        const key = `${document.getElementById("serviceClassSelect").value}-${document.getElementById("serviceSectionSelect").value}`;
        
        if (service === "addLesson") {
            if(!lessons[key]) lessons[key] = Array(4).fill(null).map(() => Array(5).fill({subject: "", teacher: ""}));
            alert("تم التحديث");
        }
        renderSchedule();
    }

    renderSchedule();
</script>
</body>
</html>
