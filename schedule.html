<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية - الإدارة الموسعة</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8f9fa; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .admin-box { background: #fff; padding: 20px; border-radius: 12px; margin: 20px 0; border: 1px solid #ddd; }
        .table-card { background: white; padding: 20px; margin-bottom: 30px; border-radius: 15px; border-right: 10px solid; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background: #f2f2f2; }
        select { width: 100%; border: none; background: #f9f9f9; padding: 5px; cursor: pointer; }
        button { padding: 10px 15px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; margin: 5px; }
        @media print { .header, .admin-box, button { display: none; } .table-card { border-width: 5px; page-break-inside: avoid; } }
    </style>
</head>
<body>

<div class="header">
    <h1>نظام الإدارة المدرسية</h1>
    <div>
        <button id="loginBtn" onclick="login()">دخول</button>
        <button id="logoutBtn" onclick="logout()" style="display:none; background:#e74c3c;">خروج</button>
        <button onclick="window.print()" style="background:#27ae60;">🖨️ طباعة</button>
    </div>
</div>

<div id="adminPanel" class="admin-box" style="display:none;">
    <h3>إدارة البيانات الموسعة</h3>
    <input type="text" id="newItem" placeholder="أدخل الاسم...">
    <button onclick="addItem('subjects')">➕ مادة</button>
    <button onclick="addItem('teachers')">➕ أستاذ</button>
    <button onclick="addItem('grades')">➕ صف</button>
    <button onclick="addItem('sections')">➕ شعبة</button>
</div>

<div id="app"></div>

<script>
    let state = JSON.parse(localStorage.getItem("schoolData")) || {
        grades: ["الأول", "الثاني"], sections: ["أ", "ب"], 
        subjects: ["رياضيات", "علوم"], teachers: ["أ.أحمد"],
        lessons: {}, lessonCount: 6 // زدت عدد الحصص إلى 6
    };
    let isMember = localStorage.getItem("userRole") === "member";

    function login() { if(prompt("كلمة المرور:")==="2026") { localStorage.setItem("userRole","member"); location.reload(); } }
    function logout() { localStorage.setItem("userRole","visitor"); location.reload(); }
    
    function addItem(type) {
        const val = document.getElementById("newItem").value;
        if(!val) return alert("أدخل اسماً!");
        state[type].push(val);
        saveData();
    }

    function saveData() { localStorage.setItem("schoolData", JSON.stringify(state)); render(); }

    function update(key, r, d, type, val) {
        if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
        state.lessons[key][r][d][type] = val;
        localStorage.setItem("schoolData", JSON.stringify(state));
    }

    function render() {
        const app = document.getElementById("app");
        app.innerHTML = "";
        document.getElementById("adminPanel").style.display = isMember ? "block" : "none";
        document.getElementById("loginBtn").style.display = isMember ? "none" : "block";
        document.getElementById("logoutBtn").style.display = isMember ? "block" : "none";

        state.grades.forEach(g => {
            state.sections.forEach(s => {
                const key = `${g}-${s}`;
                if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
                
                const card = document.createElement("div");
                card.className = "table-card";
                card.style.borderRightColor = `hsl(${g.length * 50}, 70%, 50%)`;
                
                let tableHtml = `<h3>الصف ${g} - شعبة ${s}</h3><table><thead><tr><th>حصة</th><th>الأحد</th><th>الإثنين</th><th>الثلاثاء</th><th>الأربعاء</th><th>الخميس</th></tr></thead><tbody>`;
                
                for(let i=0; i<state.lessonCount; i++) {
                    tableHtml += `<tr><td>${i+1}</td>`;
                    for(let d=0; d<5; d++) {
                        tableHtml += `<td>${isMember ? 
                            `<select onchange="update('${key}',${i},${d},'sub',this.value)"><option value="">-</option>${state.subjects.map(sub=>`<option value="${sub}" ${state.lessons[key][i][d].sub==sub?'selected':''}>${sub}</option>`).join('')}</select>
                             <select onchange="update('${key}',${i},${d},'tea',this.value)"><option value="">-</option>${state.teachers.map(tea=>`<option value="${tea}" ${state.lessons[key][i][d].tea==tea?'selected':''}>${tea}</option>`).join('')}</select>`
                            : `<div>${state.lessons[key][i][d].sub||"-"}</div><div style="font-size:10px; color:#aaa;">***</div>`}</td>`;
                    }
                    tableHtml += `</tr>`;
                }
                card.innerHTML = tableHtml + "</tbody></table>";
                app.appendChild(card);
            });
        });
    }
    render();
</script>
</body>
</html>
