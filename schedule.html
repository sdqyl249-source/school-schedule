<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رؤية - التطبيق المتكامل</title>
    <style>
        :root { --primary: #5e72e4; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .nav-btns { display: flex; gap: 5px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; }
        .admin-panel { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .accordion { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; font-weight: bold; text-align: right; }
        .day-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .day-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .lesson-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 13px; }
        select, input { padding: 5px; border: 1px solid #ddd; border-radius: 5px; width: 45%; }
    </style>
</head>
<body>

<div class="nav-btns">
    <button class="btn" style="background:#5e72e4" onclick="login()">دخول الإدارة</button>
    <button class="btn" id="logoutBtn" style="background:#e74c3c; display:none;" onclick="logout()">خروج</button>
    <button class="btn" style="background:#27ae60" onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
    <select id="selG"><option>الأول</option><option>الثاني</option><option>الثالث</option><option>الرابع</option></select>
    <select id="selS"><option>أ</option><option>ب</option></select>
    <button class="btn" style="background:#2dce89" onclick="addTable()">➕ إضافة</button>
    <button class="btn" style="background:#e67e22" onclick="deleteTable()">🗑️ حذف</button>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAuWDpBoR31ZjPzaUrAe4lppufSHuMLFyI", databaseURL: "https://roya-platform-26860-default-rtdb.firebaseio.com", projectId: "roya-platform-26860" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const config = { days: ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"], lessonCount: 4 };
    let state = { lessons: {} };
    let isMember = localStorage.getItem("userRole") === "member";

    function login() { if(prompt("كلمة المرور:")==="2026") { localStorage.setItem("userRole","member"); location.reload(); } }
    function logout() { localStorage.setItem("userRole","visitor"); location.reload(); }

    database.ref('school_data').on('value', (snapshot) => { if(snapshot.exists()) { state = snapshot.val(); render(); } });

    function addTable() {
        const key = document.getElementById("selG").value + "-" + document.getElementById("selS").value;
        if(!state.lessons[key]) { state.lessons[key] = Array(5).fill(null).map(() => Array(config.lessonCount).fill({sub:"", tea:""})); database.ref('school_data').set(state); }
    }

    function deleteTable() {
        const key = document.getElementById("selG").value + "-" + document.getElementById("selS").value;
        if(state.lessons[key]) { delete state.lessons[key]; database.ref('school_data').set(state); }
    }

    function update(key, dayIdx, lessonIdx, type, val) {
        state.lessons[key][dayIdx][lessonIdx][type] = val;
        database.ref('school_data').set(state);
    }

    function render() {
        document.getElementById("adminPanel").style.display = isMember ? "block" : "none";
        document.getElementById("logoutBtn").style.display = isMember ? "block" : "none";
        const app = document.getElementById("app"); app.innerHTML = "";
        
        for (let key in state.lessons) {
            const btn = document.createElement("button");
            btn.className = "accordion";
            btn.innerText = `📋 جدول صف ${key}`;
            btn.onclick = function() { this.nextElementSibling.style.display = (this.nextElementSibling.style.display === "block") ? "none" : "block"; };
            app.appendChild(btn);

            const container = document.createElement("div");
            container.style.display = "none";
            
            state.lessons[key].forEach((dayLessons, dayIdx) => {
                const dayDiv = document.createElement("div");
                dayDiv.className = "day-card";
                dayDiv.innerHTML = `<div class="day-title">${config.days[dayIdx]}</div>`;
                
                dayLessons.forEach((l, i) => {
                    const row = document.createElement("div");
                    row.className = "lesson-row";
                    row.innerHTML = `<span>حصة ${i+1}</span>
                        ${isMember ? 
                            `<input type="text" placeholder="المادة" value="${l.sub}" onchange="update('${key}',${dayIdx},${i},'sub',this.value)">
                             <input type="text" placeholder="الأستاذ" value="${l.tea}" onchange="update('${key}',${dayIdx},${i},'tea',this.value)">`
                            : `<span>${l.sub || "-"} | ${l.tea || "-"}</span>`}`;
                    dayDiv.appendChild(row);
                });
                container.appendChild(dayDiv);
            });
            app.appendChild(container);
        }
    }
</script>
</body>
</html>
