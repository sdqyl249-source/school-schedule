<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية - الإدارة المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-panel { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .table-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #34495e; color: white; }
        .hidden-teacher { color: #aaa; font-style: italic; }
        select { width: 100%; border: none; background: #f9f9f9; padding: 2px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; background: #3498db; color: white; }
        .logout-btn { background: #e74c3c; }
    </style>
</head>
<body>

<div class="header">
    <h1>منصة رؤية التعليمية</h1>
    <div>
        <button id="loginBtn" onclick="login()">دخول الإدارة</button>
        <button id="logoutBtn" class="logout-btn" onclick="logout()" style="display:none;">خروج</button>
    </div>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
    <h3>⚙️ لوحة تحكم الإدارة</h3>
    <button onclick="addGrade()">إضافة صف</button>
    <button onclick="addLesson()">إضافة حصة</button>
</div>

<div class="table-wrapper" id="app"></div>

<script>
    let state = JSON.parse(localStorage.getItem("schoolData")) || {
        grades: ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس"],
        sections: ["أ", "ب", "ج"],
        lessonCount: 4,
        subjects: ["رياضيات", "فيزياء", "عربي", "إنجليزي"],
        teachers: ["أ. أحمد", "أ. سارة", "أ. محمود"],
        lessons: {}
    };

    let isMember = localStorage.getItem("userRole") === "member";

    function login() {
        const p = prompt("كلمة مرور الإدارة:");
        if (p === "2026") { localStorage.setItem("userRole", "member"); location.reload(); }
        else alert("خطأ!");
    }

    function logout() { localStorage.setItem("userRole", "visitor"); location.reload(); }

    function addGrade() { 
        const name = prompt("اسم الصف:"); 
        if(name) state.grades.push(name); saveData(); 
    }

    function addLesson() { state.lessonCount++; saveData(); }

    function saveData() { localStorage.setItem("schoolData", JSON.stringify(state)); render(); }

    function update(key, r, d, type, val) {
        if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
        state.lessons[key][r][d][type] = val;
        saveData();
    }

    function render() {
        const app = document.getElementById("app");
        app.innerHTML = "";
        if(isMember) document.getElementById("adminPanel").style.display = "block";
        document.getElementById("loginBtn").style.display = isMember ? "none" : "block";
        document.getElementById("logoutBtn").style.display = isMember ? "block" : "none";

        state.grades.forEach(g => {
            state.sections.forEach(s => {
                const key = `${g}-${s}`;
                if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
                
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `<h3>الصف ${g} - شعبة ${s}</h3>`;
                let table = `<table><thead><tr><th>حصة</th>${["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس"].map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
                
                for(let i=0; i<state.lessonCount; i++) {
                    table += `<tr><td>${i+1}</td>`;
                    for(let d=0; d<5; d++) {
                        table += `<td>${isMember ? 
                            `<select onchange="update('${key}',${i},${d},'sub',this.value)"><option value="">مادة</option>${state.subjects.map(s=>`<option value="${s}" ${state.lessons[key][i][d].sub==s?'selected':''}>${s}</option>`)}</select>
                             <select onchange="update('${key}',${i},${d},'tea',this.value)"><option value="">أستاذ</option>${state.teachers.map(t=>`<option value="${t}" ${state.lessons[key][i][d].tea==t?'selected':''}>${t}</option>`)}</select>`
                            : `<div>${state.lessons[key][i][d].sub||"-"}</div><div class="hidden-teacher">********</div>`}</td>`;
                    }
                    table += `</tr>`;
                }
                card.innerHTML += table + "</tbody></table>";
                app.appendChild(card);
            });
        });
    }

    render();
</script>
</body>
</html>
