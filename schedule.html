<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية - جداول الطباعة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; }
        
        /* تنسيق الجداول لتأخذ عرض الورقة */
        .table-wrapper { display: flex; flex-direction: column; gap: 40px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 3px solid; break-inside: avoid; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #999; padding: 10px; text-align: center; }
        
        /* تنسيق الطباعة لورق A4 */
        @media print {
            body { background: white; padding: 0; }
            .card { border-width: 2px; margin-bottom: 20px; page-break-inside: avoid; }
            .header, #adminPanel { display: none; }
        }
        select { width: 90%; border: none; background: transparent; }
    </style>
</head>
<body>

<div class="header">
    <strong>جدول الحصص المدرسي</strong>
    <div>
        <button onclick="login()" id="loginBtn">دخول</button>
        <button onclick="logout()" id="logoutBtn" style="display:none;">خروج</button>
        <button onclick="window.print()" style="background:#e67e22;">🖨️ طباعة A4</button>
    </div>
</div>

<div id="adminPanel" style="display:none; margin:15px 0;">
    <button onclick="addGrade()">➕ إضافة صف</button>
</div>

<div class="table-wrapper" id="app"></div>

<script>
    // جلب البيانات مع التأكد من وجود المصفوفات دائماً
    let state = JSON.parse(localStorage.getItem("schoolData")) || {
        grades: ["الأول", "الثاني", "الثالث"], 
        sections: ["أ", "ب"], 
        lessonCount: 4, 
        subjects: ["رياضيات", "علوم"], teachers: ["أ.أحمد"], 
        lessons: {}
    };

    let isMember = localStorage.getItem("userRole") === "member";

    function getUniqueColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return `hsl(${hash % 360}, 60%, 45%)`;
    }

    function addGrade() { 
        const g = prompt("اسم الصف الجديد:"); 
        if(g) { state.grades.push(g); saveData(); } 
    }

    function saveData() { localStorage.setItem("schoolData", JSON.stringify(state)); render(); }
    function login() { if(prompt("كلمة المرور:")==="2026") { localStorage.setItem("userRole","member"); location.reload(); } }
    function logout() { localStorage.setItem("userRole","visitor"); location.reload(); }

    function update(key, r, d, type, val) {
        if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
        state.lessons[key][r][d][type] = val;
        localStorage.setItem("schoolData", JSON.stringify(state));
    }

    function render() {
        const app = document.getElementById("app");
        app.innerHTML = "";
        document.getElementById("adminPanel").style.display = isMember ? "block" : "none";
        
        state.grades.forEach(g => {
            state.sections.forEach(s => {
                const key = `${g}-${s}`;
                const color = getUniqueColor(key);
                
                if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
                
                const card = document.createElement("div");
                card.className = "card";
                card.style.borderColor = color;
                card.innerHTML = `<h3 style="color:${color}">الصف ${g} - شعبة ${s}</h3>
                <table><thead><tr><th>حصة</th><th>الأحد</th><th>الإثنين</th><th>الثلاثاء</th><th>الأربعاء</th><th>الخميس</th></tr></thead><tbody></tbody></table>`;
                
                const tbody = card.querySelector("tbody");
                for(let i=0; i<state.lessonCount; i++) {
                    let row = `<tr><td>${i+1}</td>`;
                    for(let d=0; d<5; d++) {
                        row += `<td>${isMember ? 
                            `<select onchange="update('${key}',${i},${d},'sub',this.value)"><option value="${state.lessons[key][i][d].sub}">${state.lessons[key][i][d].sub||"مادة"}</option>${state.subjects.map(sub=>`<option value="${sub}">${sub}</option>`).join('')}</select>
                             <select onchange="update('${key}',${i},${d},'tea',this.value)"><option value="${state.lessons[key][i][d].tea}">${state.lessons[key][i][d].tea||"أستاذ"}</option>${state.teachers.map(tea=>`<option value="${tea}">${tea}</option>`).join('')}</select>`
                            : `<div>${state.lessons[key][i][d].sub||"-"}</div><div style="color:#aaa; font-size:10px;">***</div>`}</td>`;
                    }
                    tbody.innerHTML += row + "</tr>";
                }
                app.appendChild(card);
            });
        });
    }
    render();
</script>
</body>
</html>
