<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة رؤية - النظام المدرسي المتكامل</title>
    <style>
        :root {
            --primary: #5e72e4;
            --bg: #f8f9fe;
            --text: #32325d;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 15px; margin: 0; color: var(--text); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { padding: 20px; border-radius: 20px; color: white; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .admin-panel { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .accordion { background: #fff; border: 1px solid #e9ecef; padding: 15px; width: 100%; border-radius: 15px; margin-bottom: 10px; cursor: pointer; text-align: right; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .panel { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { color: #8898aa; font-size: 12px; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #f0f0f0; text-align: center; }
        
        select, input { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 10px; font-size: 12px; }
        .btn { padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h3>منصة رؤية</h3>
    <div>
        <button class="btn" style="background:#5e72e4" onclick="login()">دخول</button>
        <button class="btn" id="logoutBtn" style="background:#e74c3c; display:none;" onclick="logout()">خروج</button>
    </div>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
    <select id="selG"><option>الأول</option><option>الثاني</option><option>الثالث</option></select>
    <select id="selS"><option>أ</option><option>ب</option></select>
    <button class="btn" style="background:#2dce89" onclick="addSpecificTable()">إضافة جدول</button>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAuWDpBoR31ZjPzaUrAe4lppufSHuMLFyI",
        databaseURL: "https://roya-platform-26860-default-rtdb.firebaseio.com",
        projectId: "roya-platform-26860"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let state = { lessons: {}, subjects: ["رياضيات", "علوم", "عربي", "إنجليزي"] };
    let isMember = localStorage.getItem("userRole") === "member";

    function login() { if(prompt("كلمة المرور:")==="2026") { localStorage.setItem("userRole","member"); location.reload(); } }
    function logout() { localStorage.setItem("userRole","visitor"); location.reload(); }

    database.ref('school_data').on('value', (snapshot) => {
        if(snapshot.exists()) { state = snapshot.val(); render(); }
    });

    function addSpecificTable() { 
        const key = document.getElementById("selG").value + "-" + document.getElementById("selS").value;
        if(!state.lessons[key]) { 
            state.lessons[key] = Array(4).fill(null).map(() => Array(5).fill({sub:"", tea:""})); 
            database.ref('school_data').set(state);
        } 
    }

    function update(key, r, d, type, val) { 
        state.lessons[key][r][d][type] = val; 
        database.ref('school_data').set(state); 
    }

    function render() {
        document.getElementById("adminPanel").style.display = isMember ? "block" : "none";
        document.getElementById("logoutBtn").style.display = isMember ? "block" : "none";
        const app = document.getElementById("app"); app.innerHTML = "";
        
        for (let key in state.lessons) {
            const btn = document.createElement("button");
            btn.className = "accordion";
            btn.innerHTML = `📋 جدول الصف ${key} <span>▼</span>`;
            btn.onclick = function() { this.nextElementSibling.style.display = (this.nextElementSibling.style.display === "block") ? "none" : "block"; };
            app.appendChild(btn);

            const panel = document.createElement("div");
            panel.className = "panel";
            let html = `<table><thead><tr><th>حصة</th><th>أحد</th><th>إثنين</th><th>ثلاثاء</th><th>أربعاء</th><th>خميس</th></tr></thead><tbody>`;
            for(let i=0; i<4; i++) {
                html += `<tr><td>${i+1}</td>`;
                for(let d=0; d<5; d++) {
                    html += `<td>${isMember ? 
                        `<select onchange="update('${key}',${i},${d},'sub',this.value)"><option value="">مادة</option>${state.subjects.map(s=>`<option value="${s}" ${state.lessons[key][i][d].sub==s?'selected':''}>${s}</option>`).join('')}</select>
                         <input type="text" placeholder="الأستاذ" value="${state.lessons[key][i][d].tea || ''}" onchange="update('${key}',${i},${d},'tea',this.value)">`
                        : (state.lessons[key][i][d].sub || "-")}</td>`;
                } html += `</tr>`;
            }
            panel.innerHTML = html + "</tbody></table>";
            app.appendChild(panel);
        }
    }
</script>
</body>
</html>
