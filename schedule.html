<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية - النظام المدرسي المتكامل</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            .admin-panel, .nav-btns, .accordion { display: none !important; }
            .panel { display: block !important; border: none !important; page-break-after: always; }
            table { width: 100% !important; }
        }

        .nav-btns {
            display: flex;
            flex-direction: row-reverse;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .admin-panel { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .accordion { background: #2c3e50; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; text-align: right; font-weight: bold; }
        .panel { background: white; padding: 15px; border: 1px solid #ddd; margin-bottom: 20px; display: none; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        select { width: 100%; border: none; background: #f9f9f9; padding: 5px; cursor: pointer; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; margin: 5px; }

        /* تحسين العرض على الهاتف */
        @media (max-width: 768px) {
        table { font-size: 12px; }
        th, td { padding: 4px; }
        .accordion { font-size: 14px; padding: 10px; }
        .btn { font-size: 14px; padding: 8px; }
        body { padding: 10px; }
    }
    </style>
</head>
<body>

<div class="nav-btns">
    <button class="btn" style="background:#34495e" onclick="window.location.href='index.html'">🏠 الرئيسية</button>
    <button class="btn" style="background:#27ae60" onclick="window.print()">🖨️ طباعة PDF</button>
    <button class="btn" id="loginBtn" style="background:#3498db" onclick="login()">دخول الإدارة</button>
    <button class="btn" id="logoutBtn" style="background:#e74c3c; display:none;" onclick="logout()">خروج</button>
    <!-- زر التحكم الجماعي -->
    <button class="btn" style="background:#8e44ad" onclick="toggleAll()">📂 توسيع/طي جميع الجداول</button>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
    <select id="selG"><option>الأول</option><option>الثاني</option><option>الثالث</option><option>الرابع</option><option>الخامس</option><option>السادس</option></select>
    <select id="selS"><option>أ</option><option>ب</option><option>ج</option></select>
    <button class="btn" style="background:#27ae60" onclick="addSpecificTable()">➕ إنشاء جدول</button>
</div>

<div id="app"></div>

<script>
    const allGrades = ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس"];
    const allSections = ["أ", "ب", "ج"];
    let state = JSON.parse(localStorage.getItem("schoolData")) || { 
        lessons: {}, subjects: ["رياضيات", "علوم"], teachers: ["أ.أحمد", "أ.محمد"] 
    };
    let isMember = localStorage.getItem("userRole") === "member";

    function login() { if(prompt("كلمة المرور:")==="2026") { localStorage.setItem("userRole","member"); location.reload(); } }
    function logout() { localStorage.setItem("userRole","visitor"); location.reload(); }

    function addSpecificTable() { 
        const key = document.getElementById("selG").value + "-" + document.getElementById("selS").value;
        if(!state.lessons[key]) { state.lessons[key] = Array(6).fill(null).map(() => Array(5).fill({sub:"", tea:""})); saveData(); } 
    }

    function saveData() { localStorage.setItem("schoolData", JSON.stringify(state)); render(); }
    function update(key, r, d, type, val) { 
        state.lessons[key][r][d][type] = val; 
        localStorage.setItem("schoolData", JSON.stringify(state)); 
    }
    
    function render() {
        document.getElementById("adminPanel").style.display = isMember ? "block" : "none";
        document.getElementById("loginBtn").style.display = isMember ? "none" : "block";
        document.getElementById("logoutBtn").style.display = isMember ? "block" : "none";
        
        const app = document.getElementById("app"); app.innerHTML = "";
        allGrades.forEach(g => {
            allSections.forEach(s => {
                const key = `${g}-${s}`;
                if (state.lessons[key]) {
                    const btn = document.createElement("button");
                    btn.className = "accordion";
                    btn.innerHTML = `📋 الصف ${g} - شعبة ${s}`;
                    btn.onclick = function() { this.nextElementSibling.style.display = (this.nextElementSibling.style.display === "block") ? "none" : "block"; };
                    app.appendChild(btn);

                    const panel = document.createElement("div");
                    panel.className = "panel";
                    let html = `<table><thead><tr><th>حصة</th><th>الأحد</th><th>الإثنين</th><th>الثلاثاء</th><th>الأربعاء</th><th>الخميس</th></tr></thead><tbody>`;
                    for(let i=0; i<6; i++) {
                        html += `<tr><td>${i+1}</td>`;
                        for(let d=0; d<5; d++) {
                            html += `<td>${isMember ? 
                                `<select onchange="update('${key}',${i},${d},'sub',this.value)"><option value="">مادة</option>${state.subjects.map(sub=>`<option value="${sub}" ${state.lessons[key][i][d].sub==sub?'selected':''}>${sub}</option>`).join('')}</select>
                                 <select onchange="update('${key}',${i},${d},'tea',this.value)"><option value="">أستاذ</option>${state.teachers.map(tea=>`<option value="${tea}" ${state.lessons[key][i][d].tea==tea?'selected':''}>${tea}</option>`).join('')}</select>`
                                : (state.lessons[key][i][d].sub || "-")}</td>`;
                        } html += `</tr>`;
                    }
                    panel.innerHTML = html + "</tbody></table>";
                    app.appendChild(panel);
                }
            });
        });
    }

    // دالة التحكم الجماعي
    function toggleAll() {
        document.querySelectorAll(".panel").forEach(panel => {
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        });
    }

    render();
</script>

<script src="schedule_only.js"></script>
</body>
</html>
