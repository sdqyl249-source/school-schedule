<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جدول الدروس</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; margin: 5px; }
        .admin-panel { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ccc; margin-top: 20px; }
    </style>
</head>
<body>

<!-- شريط التنقل العلوي -->
<div class="nav-btns">
    <button class="btn" style="background:var(--primary)" onclick="login()">دخول الإدارة</button>
    <button class="btn" id="logoutBtn" style="background:var(--danger); display:none;" onclick="logout()">خروج</button>
    <button class="btn" style="background:var(--success)" onclick="window.print()">🖨️ طباعة الجدول</button>
    <a href="index.html" class="btn" style="background:#34495e; text-decoration:none;">🏠 العودة للرئيسية</a>
</div>

<!-- محتوى الجدول -->
<div class="card">
    <h3>📅 جدول الدروس المدرسي</h3>
    <div id="app"></div>
</div>

<!-- لوحة التحكم (تظهر للمدير فقط) -->
<div class="admin-panel" id="adminPanel">
    <select id="selG">
        <option value="الأول">الأول</option><option value="الثاني">الثاني</option>
        <option value="الثالث">الثالث</option><option value="الرابع">الرابع</option>
        <option value="الخامس">الخامس</option><option value="السادس">السادس</option>
    </select>
    <select id="selS">
        <option value="أ">أ</option><option value="ب">ب</option><option value="ج">ج</option>
    </select>
    <button class="btn" style="background:var(--success)" onclick="addTable()">➕ إضافة جدول</button>
</div>

<!-- مكتبات Firebase والسكربت -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="scriot.js"></script>

<script>
    // عند تحميل الصفحة، تحقق من مستوى المستخدم فوراً
    document.addEventListener('DOMContentLoaded', () => {
        const level = localStorage.getItem("userLevel");
        if (level === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("logoutBtn").style.display = "inline-block";
        }
    });

    // دالة الدخول
    function login() {
        const code = prompt("يرجى إدخال رمز الدخول:");
        if (code === "ahmed") {
            localStorage.setItem("userLevel", "admin");
            location.reload();
        } else if (code === "2026") {
            localStorage.setItem("userLevel", "member");
            alert("تم الدخول كعضو");
            location.reload();
        } else {
            localStorage.setItem("userLevel", "visitor");
            alert("رمز خاطئ!");
        }
    }

    // دالة الخروج
    function logout() {
        localStorage.removeItem("userLevel");
        location.reload();
    }
</script>

</body>
