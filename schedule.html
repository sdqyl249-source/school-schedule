<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جدول الدروس</title>
    <style>
        body {
            font-family: "Tahoma", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        header {
            background: #3498db;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 15px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn:hover {
            background: #2980b9;
        }
        .page {
            display: none;
        }
        #mySidebar {
            position: fixed;
            top: 0;
            right: -250px;
            width: 250px;
            height: 100%;
            background: #2c3e50;
            color: white;
            transition: right 0.3s;
            padding: 20px;
        }
        #mySidebar.active {
            right: 0;
        }
        #mySidebar button {
            display: block;
            margin: 10px 0;
            width: 100%;
            padding: 10px;
            background: #34495e;
            border: none;
            color: white;
            cursor: pointer;
        }
        #mySidebar button:hover {
            background: #1abc9c;
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 منصة رؤية - جدول الدروس</h1>
        <button id="authBtn" class="btn" onclick="handleAuth()">🔐 تسجيل الدخول</button>
        <button class="btn" onclick="toggleSidebar()">☰ القائمة</button>
    </header>

    <div id="mySidebar">
        <button onclick="show('schedule-page')">📅 الجدول الدراسي</button>
        <button onclick="show('ann-page')">📢 الإعلانات</button>
        <button onclick="show('library-page')">📖 المكتبة</button>
    </div>

    <div class="container">
        <!-- صفحة الجدول -->
        <div id="schedule-page" class="page" style="display:block;">
            <h2>📅 الجداول الدراسية</h2>
            <div id="schedule-container"></div>
        </div>

        <!-- صفحة الإعلانات -->
        <div id="ann-page" class="page">
            <h2>📢 الإعلانات</h2>
            <!-- عناصر الإدارة لإضافة إعلان -->
            <div id="admin-add-ann" style="display:none; margin-bottom:15px;">
                <input id="ann-title" type="text" placeholder="عنوان الإعلان" style="width:100%; padding:8px; margin-bottom:5px;">
                <textarea id="ann-desc" placeholder="وصف الإعلان" style="width:100%; padding:8px; margin-bottom:5px;"></textarea>
                <input id="ann-media" type="text" placeholder="رابط صورة/فيديو" style="width:100%; padding:8px; margin-bottom:5px;">
                <button class="btn" onclick="uploadAnnouncement()">✅ نشر الإعلان</button>
            </div>
            <div id="ann-list"></div>
        </div>

        <!-- صفحة المكتبة -->
        <div id="library-page" class="page">
            <h2>📖 المكتبة</h2>
            <!-- عناصر الإدارة لإضافة ملف -->
            <div id="admin-library-add" style="display:none; margin-bottom:15px;">
                <p>📤 إضافة ملف جديد (تظهر للإدارة فقط)</p>
                <!-- يمكنك لاحقًا إضافة حقول رفع الملفات هنا -->
            </div>
            <div id="library-list"></div>
        </div>
    </div>

    <!-- ربط ملف السكربت -->
    <script src="scriot.js"></script>
</body>
</html>
