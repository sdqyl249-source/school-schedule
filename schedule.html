<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جدول الدروس</title>
    <style>
    /* الإعدادات العامة */
    <style>
    /* تنسيق عام للصفحة */
    body { 
        font-family: 'Segoe UI', Tahoma, sans-serif; 
        background-color: #f0f2f5; 
        margin: 0; 
        padding: 20px; 
        direction: rtl; 
    }

    /* شريط التنقل */
    .nav-btns { 
        display: flex; 
        gap: 15px; 
        background: #ffffff; 
        padding: 15px 25px; 
        border-radius: 50px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        margin-bottom: 30px; 
        justify-content: center;
        align-items: center;
    }

    /* تنسيق كارد الجدول */
    .card { 
        background: #ffffff; 
        padding: 25px; 
        border-radius: 15px; 
        box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
        margin-bottom: 25px; 
        border-right: 5px solid #3498db; /* لمسة جمالية */
    }

    h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }

    /* الجدول */
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; }
    th { background-color: #3498db; color: white; padding: 15px; }
    td { border: 1px solid #edf2f7; padding: 15px; text-align: center; }
    
    /* الأزرار */
    <style>
    /* تنسيق موحد لجميع الأزرار */
    .btn { 
        padding: 10px 20px; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        color: white; 
        font-weight: 600; 
        text-decoration: none; /* لمنع الخط تحت الروابط */
        display: inline-block;
        transition: 0.3s;
        text-align: center;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    /* تخصيص الألوان */
    .btn-login { background: var(--primary, #3498db); }
    .btn-logout { background: var(--danger, #e74c3c); }
    .btn-print { background: var(--success, #27ae60); }
    .btn-home { background: #34495e; }
</style>
    .admin-panel { 
        background: #fff; padding: 25px; border-radius: 15px; 
        border: 2px dashed #3498db; margin-top: 20px; 
    }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-left: 10px; }
</style>
</style>
</head>
<body>
    <!-- شريط التنقل العلوي المحدث -->
<div class="nav-btns">
    <button class="btn btn-login" onclick="login()">دخول الإدارة</button>
    <button class="btn btn-logout" id="logoutBtn" style="display:none;" onclick="logout()">خروج</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ طباعة الجدول</button>
    <a href="index.html" class="btn btn-home">🏠 العودة للرئيسية</a>
</div>

<!-- محتوى الجدول -->
<div class="card">
    <h3>📅 جدول الدروس المدرسي</h3>
    <div id="app"></div>
</div>

<!-- لوحة التحكم (تظهر للمدير فقط) -->
<div class="admin-panel" id="adminPanel">
    <select id="selG">
        <option value="الأول">الأول</option><option value="الثاني">الثاني</option>
        <option value="الثالث">الثالث</option><option value="الرابع">الرابع</option>
        <option value="الخامس">الخامس</option><option value="السادس">السادس</option>
    </select>
    <select id="selS">
        <option value="أ">أ</option><option value="ب">ب</option><option value="ج">ج</option>
    </select>
    <button class="btn" style="background:var(--success)" onclick="addTable()">➕ إضافة جدول</button>
</div>

<!-- مكتبات Firebase والسكربت -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="scriot.js"></script>
<script>
    // عند تحميل الصفحة، تحقق من مستوى المستخدم فوراً
    document.addEventListener('DOMContentLoaded', () => {
        const level = localStorage.getItem("userLevel");
        if (level === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("logoutBtn").style.display = "inline-block";
        }
    });
    // دالة الدخول
    function login() {
        const code = prompt("يرجى إدخال رمز الدخول:");
        if (code === "ahmed") {
            localStorage.setItem("userLevel", "admin");
            location.reload();
        } else if (code === "2026") {
            localStorage.setItem("userLevel", "member");
            alert("تم الدخول كعضو");
            location.reload();
        } else {
            localStorage.setItem("userLevel", "visitor");
            alert("رمز خاطئ!");
        }
    }
    // دالة الخروج
    function logout() {
        localStorage.removeItem("userLevel");
        location.reload();
    }
</script>
</body>
</html>
