<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة رؤية - الإدارة الملونة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main-color: #2c3e50; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; padding: 10px; }
        .header { background: var(--main-color); color: white; padding: 15px; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; }
        .table-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 8px solid #ccc; }
        /* ألوان تمييز الشعب */
        .card.sec-أ { border-top-color: #3498db; }
        .card.sec-ب { border-top-color: #e67e22; }
        .card.sec-ج { border-top-color: #27ae60; }
        .card.sec-د { border-top-color: #9b59b6; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 6px; text-align: center; }
        th { background: #f8f9fa; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 5px; background: #3498db; color: white; }
        .hidden-teacher { color: #bbb; font-size: 10px; }
        select { width: 100%; border: 1px solid #ddd; padding: 2px; }
    </style>
</head>
<body>

<div class="header">
    <strong>جدول الحصص المتكامل</strong>
    <div>
        <button onclick="login()" id="loginBtn">دخول الإدارة</button>
        <button onclick="logout()" id="logoutBtn" style="display:none; background:#e74c3c;">خروج</button>
        <button class="btn-pdf" onclick="exportPDF()" style="background:#e67e22;">📥 PDF</button>
    </div>
</div>

<div id="adminPanel" style="display:none; margin-top:15px; background:white; padding:15px; border-radius:10px;">
    <button onclick="addGrade()">➕ إضافة صف</button>
    <button onclick="addSection()">➕ إضافة شعبة</button>
</div>

<div class="table-wrapper" id="app"></div>

<script>
    let state = JSON.parse(localStorage.getItem("schoolData")) || {
        grades: ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس"],
        sections: ["أ", "ب", "ج"],
        lessonCount: 4,
        subjects: ["رياضيات", "فيزياء", "عربي", "إنجليزي"],
        teachers: ["أ.أحمد", "أ.سارة", "أ.محمود"],
        lessons: {}
    };
    let isMember = localStorage.getItem("userRole") === "member";

    function login() { if(prompt("كلمة المرور:")==="2026") { localStorage.setItem("userRole","member"); location.reload(); } }
    function logout() { localStorage.setItem("userRole","visitor"); location.reload(); }
    function addGrade() { const g = prompt("اسم الصف:"); if(g) { state.grades.push(g); saveData(); } }
    function addSection() { const s = prompt("اسم الشعبة (أ، ب، ج..):"); if(s) { state.sections.push(s); saveData(); } }
    
    function saveData() { localStorage.setItem("schoolData", JSON.stringify(state)); render(); }
    function exportPDF() { html2pdf().from(document.getElementById('app')).save('الجدول.pdf'); }

    function update(key, r, d, type, val) {
        if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
        state.lessons[key][r][d][type] = val;
        localStorage.setItem("schoolData", JSON.stringify(state));
    }

    function render() {
        const app = document.getElementById("app");
        app.innerHTML = "";
        document.getElementById("adminPanel").style.display = isMember ? "block" : "none";
        document.getElementById("loginBtn").style.display = isMember ? "none" : "block";
        document.getElementById("logoutBtn").style.display = isMember ? "block" : "none";

        state.grades.forEach(g => {
            state.sections.forEach(s => {
                const key = `${g}-${s}`;
                if (!state.lessons[key]) state.lessons[key] = Array(state.lessonCount).fill(null).map(() => Array(5).fill({sub:"", tea:""}));
                
                const card = document.createElement("div");
                card.className = `card sec-${s}`; // إضافة كلاس خاص بالشعبة لتلوينها
                card.innerHTML = `<h4>صف ${g} - شعبة ${s}</h4><table><thead><tr><th>حصة</th>${["أحد","اثنين","ثلاثاء","أربعاء","خميس"].map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody></tbody></table>`;
                
                const tbody = card.querySelector("tbody");
                for(let i=0; i<state.lessonCount; i++) {
                    let row = `<tr><td>${i+1}</td>`;
                    for(let d=0; d<5; d++) {
                        row += `<td>${isMember ? 
                            `<select onchange="update('${key}',${i},${d},'sub',this.value)"><option value="">-</option>${state.subjects.map(sub=>`<option value="${sub}" ${state.lessons[key][i][d].sub==sub?'selected':''}>${sub}</option>`).join('')}</select>
                             <select onchange="update('${key}',${i},${d},'tea',this.value)"><option value="">-</option>${state.teachers.map(tea=>`<option value="${tea}" ${state.lessons[key][i][d].tea==tea?'selected':''}>${tea}</option>`).join('')}</select>`
                            : `<div>${state.lessons[key][i][d].sub||"-"}</div><div class="hidden-teacher">***</div>`}</td>`;
                    }
                    tbody.innerHTML += row + "</tr>";
                }
                app.appendChild(card);
            });
        });
    }
    render();
</script>
</body>
</html>
