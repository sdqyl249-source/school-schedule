<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الصفوف - منصة الوادي</title>
    <link rel="stylesheet" href="classes_style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f0f2f5; }
        
        /* تنسيق القائمة الجانبية (Sidebar) */
        .sidebar { height: 100vh; width: 0; position: fixed; top: 0; right: 0; background: linear-gradient(180deg, #ffffff, #dfe9f3); box-shadow: 0 4px 25px rgba(0,0,0,0.1); transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow: hidden; z-index: 1000; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-title { color: #2c3e50; font-size: 20px; font-weight: bold; padding-bottom: 20px; border-bottom: 2px solid rgba(41, 128, 185, 0.2); margin-bottom: 20px; text-align: center; white-space: nowrap; }
        .menu-item { color: #2c3e50; background: rgba(255, 255, 255, 0.2); border-radius: 12px; margin: 10px 15px; padding: 12px 18px; text-align: center; transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; white-space: nowrap; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 12px #74b9ff; transform: translateY(-3px); }
        .logout-btn { margin-top: auto; padding: 12px; background: rgba(231, 76, 60, 0.1); color: #c0392b; border: 1px solid rgba(231, 76, 60, 0.2); border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; width: 80%; margin: 20px auto; }
        .logout-btn:hover { background: #e74c3c; color: white; }
        .toggle-btn { position: fixed; top: 20px; right: 20px; z-index: 1002; padding: 12px 20px; cursor: pointer; background: #ffffff; color: #2c3e50; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-weight: bold; transition: 0.3s; }
        
        .main-content { margin-right: 0; padding: 30px; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        /* البطاقات والدردشة */
        .class-card { background: white; padding: 18px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.3s; cursor: pointer; }
        .class-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.12); }
        .class-card button { padding: 6px 12px; margin-left: 5px; margin-top: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #chatSection { display: none; margin-top: 30px; border-top: 2px solid #ccc; padding-top: 20px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .chat-wrapper { display: flex; flex-direction: column; height: 350px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background-color: #fcfcfc; }
        .chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; padding: 8px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .msg-bubble { background: #e3f2fd; padding: 8px 12px; border-radius: 8px; max-width: 70%; word-break: break-word; }
        
        /* الفئة الخاصة بالمدير والأستاذ لإخفائها عن الطلاب افتراضياً */
        .admin-only { display: none; }
    </style>
</head>
<body>

    <!-- زر فتح القائمة الجانبية -->
    <button class="toggle-btn" onclick="document.getElementById('mySidebar').style.width = '250px';">☰ القائمة</button>

    <!-- القائمة الجانبية -->
    <div class="sidebar" id="mySidebar">
        <div class="sidebar-title">🏞️ منصة الوادي</div>
        <div class="menu-item" onclick="location.href='index.html'">🏠 الرئيسية</div>
        <div class="menu-item" onclick="location.href='classes.html'">🏫 إدارة الصفوف</div>
        <button onclick="localStorage.removeItem('currentUser'); window.location.href='login.html';" class="logout-btn">تسجيل الخروج</button>
    </div>
    
    <div onclick="document.getElementById('mySidebar').style.width = '0';" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:999; display:none;" id="sidebarOverlay"></div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <h2>إدارة الصفوف 🏫</h2>

        <!-- بوكس إضافة صف جديد (يظهر للأستاذ والمدير فقط) -->
        <div id="adminPanel" class="admin-only" style="border: 2px dashed #27ae60; padding: 20px; margin-bottom: 25px; border-radius: 10px; background: #fff;">
            <h3>إضافة صف جديد 🏫</h3>
            <label>اسم الصف:</label>
            <select id="className" style="padding: 6px; margin-left: 10px;">
                <option value="الاول">الاول</option>
                <option value="الثاني">الثاني</option>
                <option value="الثالث">الثالث</option>
                <option value="الرابع">الرابع</option>
                <option value="الخامس">الخامس</option>
                <option value="السادس">السادس</option>
            </select>

            <label>الشعبة:</label>
            <select id="classSection" style="padding: 6px; margin-left: 10px;">
                <option value="أ">أ</option>
                <option value="ب">ب</option>
                <option value="ج">ج</option>
                <option value="د">د</option>
                <option value="هـ">هـ</option>
            </select>

            <button id="saveClassBtn" style="padding: 8px 18px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">حفظ الصف</button>
        </div>

        <!-- وعاء عرض بطاقات الصفوف -->
        <div class="dashboard-container" id="classesContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        </div>

        <!-- قسم الدردشة الخاصة بالصف (تفتح مباشرة عند النقر على الصف) -->
        <div id="chatSection">
            <h3 id="currentChatTitle">غرفة الدردشة للصف: <span></span></h3>
            <div class="chat-wrapper">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="message-input" placeholder="اكتب رسالتك هنا...">
                    <button id="send-btn" style="background: #2980b9; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">إرسال ✉️</button>
                </div>
            </div>
            <!-- زر إغلاق الدردشة والعودة للقائمة (يظهر للاستاذ والمدير فقط) -->
            <button id="closeChatBtn" class="admin-only" onclick="document.getElementById('chatSection').style.display='none'; document.getElementById('classesContainer').style.display='grid'; if(isAdmin) document.getElementById('adminPanel').style.display='block';" style="margin-top: 12px; background: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer;">إغلاق الدردشة والعودة للقائمة</button>
        </div>
    </div>

    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // التحكم بالقائمة الجانبية
        document.querySelector('.toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('mySidebar').style.width = '250px';
            document.getElementById('sidebarOverlay').style.display = 'block';
        });
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            document.getElementById('mySidebar').style.width = '0';
            document.getElementById('sidebarOverlay').style.display = 'none';
        });

        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAuWDpBoR31ZjPzaUrAe4lppufSHuMLFyI",
            databaseURL: "https://roya-platform-26860-default-rtdb.firebaseio.com",
            projectId: "roya-platform-26860",
            storageBucket: "roya-platform-26860.appspot.com",
            messagingSenderId: "897544406776",
            appId: "1:897544406776:web:aa112013dea672fb141d0d"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        window.database = firebase.database();
        let activeChatId = "";
        let chatListener = null;
        let isAdmin = false; // متغير عام لتحديد هل المستخدم الحالي أستاذ أو مدير

        document.addEventListener('DOMContentLoaded', () => {
            let currentUser = null;

            try {
                currentUser = JSON.parse(localStorage.getItem("currentUser"));
                if (currentUser) {
                    const userRole = currentUser.role ? currentUser.role.trim().toLowerCase() : "";
                    
                    // التحقق من صلاحيات الأستاذ أو المدير
                    if (userRole === 'teacher' || userRole === 'admin' || userRole === 'المدير' || userRole === 'الأستاذ') {
                        isAdmin = true;
                        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                    }
                    
                    const header = document.querySelector('h2');
                    const infoBox = document.createElement('div');
                    infoBox.innerHTML = `<h4 style="color: #2980b9; margin-bottom: 20px;">مرحباً بك يا ${currentUser.name} (${currentUser.role || 'مستخدم'})</h4>`;
                    header.parentNode.insertBefore(infoBox, header.nextSibling);
                }
            } catch(e) {}

            // جلب وعرض الصفوف
            const container = document.getElementById("classesContainer");
            if (container && window.database) {
                window.database.ref('classes/').on('value', (snapshot) => {
                    container.innerHTML = "";
                    const data = snapshot.val();
                    if (data) {
                        Object.values(data).forEach(cls => {
                            const card = document.createElement("div");
                            card.className = "class-card";
                            
                            // أزرار الحذف والتعديل تظهر للأستاذ والمدير فقط داخل البطاقة
                            let adminButtonsHTML = "";
                            if (isAdmin) {
                                adminButtonsHTML = `
                                    <div style="margin-top: 10px;" onclick="event.stopPropagation();">
                                        <button onclick="window.editClass('${cls.id}', '${cls.name}', '${cls.section}')" style="background: #f39c12; color: white;">✏️ تعديل</button>
                                        <button onclick="window.deleteClass('${cls.id}')" style="background: #e74c3c; color: white;">🗑️ حذف</button>
                                    </div>`;
                            }

                            card.innerHTML = `
                                <h3>${cls.name} - شعبة ${cls.section}</h3>
                                <small style="color: #7f8c8d;">رمز الصف: ${cls.id}</small>
                                ${adminButtonsHTML}`;
                            
                            // عند النقر على بطاقة الصف يتم الدخول مباشرة لغرفة الدردشة الخاصة به
                            card.onclick = () => {
                                window.openChat(cls.id, `${cls.name} - شعبة ${cls.section}`);
                            };

                            container.appendChild(card);
                        });
                    }
                });
            }

            // زر حفظ صف جديد
            const saveBtn = document.getElementById("saveClassBtn");
            if (saveBtn) {
                saveBtn.onclick = function() {
                    const name = document.getElementById("className").value;
                    const section = document.getElementById("classSection").value;
                    const id = Math.floor(1000 + Math.random() * 9000).toString();
                    
                    window.database.ref('classes/' + id).set({
                        id: id,
                        name: name,
                        section: section,
                        lessons: [{ title: "الدرس الإفتراضي الأول" }]
                    }).then(() => {
                        alert("تم حفظ الصف بنجاح!");
                    }).catch((err) => {
                        alert("خطأ أثناء الحفظ: " + err.message);
                    });
                };
            }

            // إرسال رسالة في الدردشة
            const sendBtn = document.getElementById("send-btn");
            const input = document.getElementById("message-input");
            if (sendBtn && input) {
                sendBtn.onclick = () => sendChatMessage(currentUser);
                input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });
            }
        });

        // 1. وظيفة تعديل اسم الصف أو الشعبة
        window.editClass = function(id, oldName, oldSection) {
            const newName = prompt("تعديل اسم الصف:", oldName);
            if (!newName) return;
            const newSection = prompt("تعديل الشعبة:", oldSection);
            if (!newSection) return;

            window.database.ref('classes/' + id).update({
                name: newName,
                section: newSection
            }).then(() => {
                alert("تم تحديث بيانات الصف بنجاح!");
            }).catch(err => alert("خطأ في التعديل: " + err.message));
        };

        // 2. وظيفة حذف الصف
        window.deleteClass = function(id) {
            if (confirm("هل أنت متأكد من حذف هذا الصف نهائياً؟")) {
                window.database.ref('classes/' + id).remove()
                    .then(() => alert("تم الحذف بنجاح"))
                    .catch((err) => alert("خطأ في الحذف: " + err.message));
            }
        };

        // 3. فتح دردشة الصف مباشرة عند النقر عليه وإخفاء القائمة الرئيسية
        window.openChat = function(classId, className) {
            activeChatId = classId;
            document.getElementById('currentChatTitle').querySelector('span').innerText = className;
            
            // إخفاء قائمة الصفوف وإظهار نافذة الدردشة فوراً
            document.getElementById('classesContainer').style.display = 'none';
            const adminPanel = document.getElementById('adminPanel');
            if(adminPanel) adminPanel.style.display = 'none';
            document.getElementById('chatSection').style.display = 'block';
            
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = "جاري تحميل الرسائل...";

            if (chatListener) {
                window.database.ref('chats/' + activeChatId).off('value', chatListener);
            }

            chatListener = window.database.ref('chats/' + classId).on('value', snapshot => {
                messagesContainer.innerHTML = "";
                const msgs = snapshot.val();
                if (msgs) {
                    Object.values(msgs).forEach(m => {
                        const bubble = document.createElement('div');
                        bubble.className = 'msg-bubble';
                        bubble.innerHTML = `<strong>${m.sender}:</strong> ${m.text}`;
                        messagesContainer.appendChild(bubble);
                    });
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else {
                    messagesContainer.innerHTML = "<p style='color: #888; text-align:center;'>لا توجد رسائل بعد. كن أول المراسلتين!</p>";
                }
            });
        };

        // إرسال الرسالة إلى قاعدة البيانات
        function sendChatMessage(user) {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !activeChatId) return;

            const senderName = user ? user.name : "مستخدم";
            window.database.ref('chats/' + activeChatId).push({
                text: text,
                sender: senderName,
                timestamp: Date.now()
            }).then(() => {
                input.value = "";
            }).catch(err => alert("فشل إرسال الرسالة: " + err.message));
        }
    </script>
</body>
</html>
