<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الصفوف - منصة الوادي</title>
    <link rel="stylesheet" href="classes_style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f0f2f5; }
        .main-content { padding: 30px; }
        .class-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-content">
        <h2>إدارة الصفوف 🏫</h2>

        <div style="border: 2px dashed #27ae60; padding: 20px; margin-bottom: 20px; border-radius: 10px; background: #fff;">
            <h3>إضافة صف جديد 🏫</h3>
            <label>اسم الصف:</label>
            <select id="className">
                <option value="الاول">الاول</option>
                <option value="الثاني">الثاني</option>
                <option value="الثالث">الثالث</option>
            </select>
            <label>الشعبة:</label>
            <select id="classSection">
                <option value="أ">أ</option>
                <option value="ب">ب</option>
            </select>
            <button id="saveClassBtn" style="padding: 8px 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">حفظ الصف</button>
        </div>

        <div id="classesContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
    </div>

    <!-- استخدام إصدار توافقي موثوق ومستقر جداً -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        console.log("0. بدأ تحميل الصفحة...");

        // فحص هل المكتبة وصلت أصلاً للمتصفح؟
        if (typeof firebase === 'undefined') {
            console.error("خطأ خطير: لم يتمكن المتصفح من تحميل مكتبة Firebase من الإنترنت. تأكد من اتصال الإنترنت أو أن الشبكة لا تحظر الروابط الخارجية.");
        } else {
            console.log("1. مكتبة Firebase تم تحميلها بنجاح.");
            
            const firebaseConfig = {
                apiKey: "AIzaSyAuWDpBoR31ZjPzaUrAe4lppufSHuMLFyI",
                databaseURL: "https://roya-platform-26860-default-rtdb.firebaseio.com",
                projectId: "roya-platform-26860",
                storageBucket: "roya-platform-26860.appspot.com",
                messagingSenderId: "897544406776",
                appId: "1:897544406776:web:aa112013dea672fb141d0d"
            };

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                window.database = firebase.database();
                console.log("2. نجاح تام! قاعدة البيانات أصبحت جاهزة:", window.database);
            } catch (err) {
                console.error("فشل في تهيئة Firebase:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const saveBtn = document.getElementById("saveClassBtn");
            if (saveBtn) {
                saveBtn.onclick = function() {
                    if (!window.database) {
                        alert("لا يمكن الحفظ، قاعدة البيانات غير متصلة (undefined).");
                        return;
                    }
                    const name = document.getElementById("className").value;
                    const section = document.getElementById("classSection").value;
                    const id = Math.floor(1000 + Math.random() * 9000).toString();
                    
                    window.database.ref('classes/' + id).set({
                        id: id,
                        name: name,
                        section: section
                    }).then(() => {
                        alert("تم حفظ الصف بنجاح في قاعدة البيانات!");
                    }).catch((err) => {
                        alert("خطأ في قاعدة البيانات: " + err.message);
                    });
                };
            }
        });
    </script>
</body>
</html>
